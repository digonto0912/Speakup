<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeakUp — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0c10;--surface:#111318;--card:#161b26;--border:#1e2535;--accent:#e8c97a;--text:#e2ddd4;--muted:#5a6278;--online:#4ade80;--user-color:#7ab8e8;--ai-color:#e8c97a; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .logo{font-size:1.1rem;font-weight:600;color:var(--accent);letter-spacing:-.3px}
  .logo span{color:var(--muted);font-weight:400;font-size:.8rem;margin-left:8px}
  .live-badge{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--online);background:#0d2010;border:1px solid #1a4a20;padding:4px 10px;border-radius:20px}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--online);animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .stats-bar{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
  .stat{flex:1;padding:10px;text-align:center;border-right:1px solid var(--border)}
  .stat:last-child{border-right:none}
  .stat-num{font-size:1.4rem;font-weight:600;color:var(--accent);font-family:'DM Mono',monospace}
  .stat-label{font-size:.65rem;color:var(--muted);margin-top:1px}
  .main{display:flex;flex:1;overflow:hidden}
  .sessions-panel{width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
  .panel-header{padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border);font-size:.72rem;color:var(--muted);font-weight:500;display:flex;justify-content:space-between;align-items:center}
  .sessions-list{flex:1;overflow-y:auto}
  .session-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
  .session-item:hover,.session-item.active{background:var(--card)}
  .session-id{font-size:.72rem;font-family:'DM Mono',monospace;color:var(--accent)}
  .session-meta{font-size:.68rem;color:var(--muted);margin-top:3px}
  .session-preview{font-size:.7rem;color:var(--text);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.7}
  .session-badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:.6rem;background:#0d2010;color:var(--online);border:1px solid #1a3a1a;margin-left:4px}
  .chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .chat-header{padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);font-size:.8rem;color:var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .chat-header strong{color:var(--text)}
  .chat-header-info{flex:1;min-width:0}
  .header-btns{display:flex;gap:6px;flex-shrink:0}
  .dl-btn{display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:8px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:.7rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
  .dl-btn:hover{background:#e8c97a18}
  .dl-all-btn{display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:8px;border:1px solid #7ab8e8;background:transparent;color:#7ab8e8;font-size:.7rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
  .dl-all-btn:hover{background:#7ab8e812}
  .messages-view{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
  .msg-row{display:flex;flex-direction:column;max-width:80%}
  .msg-row.user{align-self:flex-end;align-items:flex-end}
  .msg-row.ai{align-self:flex-start;align-items:flex-start}
  .msg-who{font-size:.65rem;color:var(--muted);margin-bottom:3px}
  .msg-row.user .msg-who{color:var(--user-color)}
  .msg-row.ai .msg-who{color:var(--ai-color)}
  .msg-text{padding:9px 13px;border-radius:14px;font-size:.82rem;line-height:1.55}
  .msg-row.user .msg-text{background:#1a2840;border:1px solid #1e3358}
  .msg-row.ai .msg-text{background:#1a1505;border:1px solid #3a2e0a}
  .msg-time{font-size:.6rem;color:var(--muted);margin-top:3px}
  .empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.85rem;flex-direction:column;gap:8px}
  .empty-icon{font-size:2rem;opacity:.3}
  .sessions-list::-webkit-scrollbar,.messages-view::-webkit-scrollbar{width:3px}
  .sessions-list::-webkit-scrollbar-thumb,.messages-view::-webkit-scrollbar-thumb{background:var(--border)}
  .refresh-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:3px 8px;border-radius:6px;font-size:.65rem;cursor:pointer;font-family:'DM Sans',sans-serif}
  .refresh-btn:hover{color:var(--text);border-color:var(--accent)}
  .complaint-tag{display:inline-block;margin-top:6px;padding:3px 8px;border-radius:6px;font-size:.68rem;background:#2a0a0a;border:1px solid #5a1a1a;color:#f87171}
</style>
</head>
<body>
<header>
  <span class="logo">SpeakUp <span>Admin Panel</span></span>
  <div style="display:flex;gap:10px;align-items:center">
    <button class="dl-all-btn" onclick="downloadAllSessions()">⬇ Download All Sessions</button>
    <div class="live-badge"><span class="live-dot"></span> Live Tracking</div>
  </div>
</header>
<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="statSessions">0</div><div class="stat-label">Total Sessions</div></div>
  <div class="stat"><div class="stat-num" id="statMessages">0</div><div class="stat-label">Total Messages</div></div>
  <div class="stat"><div class="stat-num" id="statUsers">0</div><div class="stat-label">User Messages</div></div>
  <div class="stat"><div class="stat-num" id="statCorrections">0</div><div class="stat-label">Corrections Given</div></div>
</div>
<div class="main">
  <div class="sessions-panel">
    <div class="panel-header">
      <span>Sessions</span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
    <div class="sessions-list" id="sessionsList">
      <div style="padding:20px;text-align:center;color:var(--muted);font-size:.75rem;">Loading...</div>
    </div>
  </div>
  <div class="chat-panel">
    <div class="chat-header" id="chatHeader">
      <div class="chat-header-info">← Select a session to view chat</div>
    </div>
    <div class="messages-view" id="messagesView">
      <div class="empty-state">
        <div class="empty-icon">👀</div>
        <div>Select a session to see what users are saying</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {apiKey:"AIzaSyAIceqMXYNY5EH_3vTmIbogjb6wJ2CCBxQ",authDomain:"speakup-27de0.firebaseapp.com",projectId:"speakup-27de0",storageBucket:"speakup-27de0.firebasestorage.app",messagingSenderId:"811108429557",appId:"1:811108429557:web:1ad8de2151de43b8f8dfbc"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allMessages = [];
let selectedSession = null;
let sessionMapGlobal = {};

function timeAgo(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return d.toLocaleDateString();
}
function formatTime(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString();
}

// Detect complaints/problems in user messages
function detectComplaints(text) {
  const keywords = ['problem','issue','error','broken','doesn\'t work','not working','crash','stuck','wrong','bad','terrible','hate','confused','help','frustrated','annoying','slow','fail','bug'];
  const lower = text.toLowerCase();
  return keywords.some(k => lower.includes(k));
}

// Download a single session as .txt
window.downloadSession = function(sessionId, msgs) {
  const persona = msgs[0]?.persona || 'casual';
  const scenario = msgs[0]?.scenario || 'free';
  const date = formatDate(msgs[0]?.timestamp);
  let content = `SpeakUp - Chat Session Export\n`;
  content += `=====================================\n`;
  content += `Session ID: ${sessionId}\n`;
  content += `Persona: ${persona} | Scenario: ${scenario}\n`;
  content += `Date: ${date}\n`;
  content += `Total messages: ${msgs.length}\n`;
  content += `=====================================\n\n`;

  msgs.forEach(msg => {
    const who = msg.role === 'user' ? '🙂 USER' : '🧑 ALEX (AI)';
    const time = formatTime(msg.timestamp);
    const hasComplaint = msg.role === 'user' && detectComplaints(msg.text || '');
    content += `[${time}] ${who}${hasComplaint ? ' ⚠️ POSSIBLE COMPLAINT' : ''}\n`;
    content += `${msg.text || ''}\n\n`;
  });

  // Add complaint summary at the bottom
  const complaints = msgs.filter(m => m.role === 'user' && detectComplaints(m.text || ''));
  if (complaints.length > 0) {
    content += `\n=====================================\n`;
    content += `⚠️ COMPLAINT/PROBLEM SUMMARY (${complaints.length} flagged messages)\n`;
    content += `=====================================\n`;
    complaints.forEach((m, i) => {
      content += `${i+1}. [${formatTime(m.timestamp)}] ${m.text}\n\n`;
    });
  }

  const blob = new Blob([content], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `speakup_session_${sessionId.slice(0,12)}_${Date.now()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
};

// Download ALL sessions as one big file
window.downloadAllSessions = function() {
  if (Object.keys(sessionMapGlobal).length === 0) {
    alert('No sessions loaded yet. Wait for data to load.');
    return;
  }
  let content = `SpeakUp - ALL Sessions Export\n`;
  content += `Generated: ${new Date().toLocaleString()}\n`;
  content += `Total sessions: ${Object.keys(sessionMapGlobal).length}\n`;
  content += `Total messages: ${allMessages.length}\n\n`;

  // Complaint summary first
  const allComplaints = allMessages.filter(m => m.role === 'user' && detectComplaints(m.text || ''));
  if (allComplaints.length > 0) {
    content += `=====================================\n`;
    content += `⚠️ ALL USER COMPLAINTS/PROBLEMS (${allComplaints.length} total)\n`;
    content += `=====================================\n`;
    allComplaints.forEach((m, i) => {
      content += `${i+1}. [Session: ${m.sessionId?.slice(0,12)}] ${m.text}\n`;
    });
    content += `\n`;
  }

  // Then each session
  Object.entries(sessionMapGlobal).forEach(([sessionId, msgs]) => {
    content += `\n${'='.repeat(50)}\n`;
    content += `SESSION: ${sessionId}\n`;
    content += `Persona: ${msgs[0]?.persona} | Scenario: ${msgs[0]?.scenario}\n`;
    content += `Date: ${formatDate(msgs[0]?.timestamp)}\n`;
    content += `${'='.repeat(50)}\n`;
    msgs.forEach(msg => {
      const who = msg.role === 'user' ? 'USER' : 'ALEX';
      const flag = msg.role === 'user' && detectComplaints(msg.text || '') ? ' ⚠️' : '';
      content += `[${formatTime(msg.timestamp)}] ${who}${flag}: ${msg.text || ''}\n`;
    });
  });

  const blob = new Blob([content], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `speakup_ALL_sessions_${Date.now()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
};

window.loadData = async function() {
  try {
    const q = query(collection(db, 'messages'), orderBy('timestamp', 'asc'));
    const snap = await getDocs(q);
    allMessages = snap.docs.map(d => ({id: d.id, ...d.data()}));

    const sessions = [...new Set(allMessages.map(m => m.sessionId))];
    const userMsgs = allMessages.filter(m => m.role === 'user');
    const corrections = allMessages.filter(m => m.role === 'ai' && m.text && m.text.includes('[CORRECTION:'));

    document.getElementById('statSessions').textContent = sessions.length;
    document.getElementById('statMessages').textContent = allMessages.length;
    document.getElementById('statUsers').textContent = userMsgs.length;
    document.getElementById('statCorrections').textContent = corrections.length;

    sessionMapGlobal = {};
    allMessages.forEach(m => {
      if (!sessionMapGlobal[m.sessionId]) sessionMapGlobal[m.sessionId] = [];
      sessionMapGlobal[m.sessionId].push(m);
    });

    const list = document.getElementById('sessionsList');
    if (sessions.length === 0) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:.75rem;">No sessions yet.<br>Share your app!</div>';
      return;
    }

    list.innerHTML = '';
    sessions.sort((a,b) => {
      const aT = sessionMapGlobal[a].at(-1)?.timestamp?.toDate?.() || 0;
      const bT = sessionMapGlobal[b].at(-1)?.timestamp?.toDate?.() || 0;
      return bT - aT;
    });

    sessions.forEach(sessionId => {
      const msgs = sessionMapGlobal[sessionId];
      const lastMsg = msgs[msgs.length-1];
      const userMsgCount = msgs.filter(m => m.role === 'user').length;
      const hasComplaint = msgs.some(m => m.role === 'user' && detectComplaints(m.text || ''));
      const persona = msgs[0]?.persona || 'casual';
      const scenario = msgs[0]?.scenario || 'free';

      const div = document.createElement('div');
      div.className = 'session-item' + (selectedSession === sessionId ? ' active' : '');
      div.innerHTML = `
        <div class="session-id">${sessionId.slice(0,16)}... ${hasComplaint ? '<span style="color:#f87171;font-size:.65rem;">⚠️ complaint</span>' : ''}</div>
        <div class="session-meta">${persona} · ${scenario} · ${userMsgCount} msgs <span class="session-badge">${timeAgo(lastMsg?.timestamp)}</span></div>
        <div class="session-preview">${lastMsg?.role==='user'?'🙂':'🧑'} ${(lastMsg?.text||'').slice(0,55)}...</div>
      `;
      div.onclick = (e) => { document.querySelectorAll('.session-item').forEach(el=>el.classList.remove('active')); div.classList.add('active'); showSession(sessionId, msgs); };
      list.appendChild(div);
    });

    if (selectedSession && sessionMapGlobal[selectedSession]) {
      showSession(selectedSession, sessionMapGlobal[selectedSession]);
    }
  } catch(e) {
    document.getElementById('sessionsList').innerHTML = `<div style="padding:16px;color:#f87171;font-size:.75rem;">Error: ${e.message}</div>`;
  }
};

window.showSession = function(sessionId, msgs) {
  selectedSession = sessionId;
  const persona = msgs[0]?.persona || 'casual';
  const scenario = msgs[0]?.scenario || 'free';
  const userMsgCount = msgs.filter(m => m.role === 'user').length;
  const hasComplaint = msgs.some(m => m.role === 'user' && detectComplaints(m.text || ''));

  document.getElementById('chatHeader').innerHTML = `
    <div class="chat-header-info">
      <strong>${sessionId.slice(0,20)}...</strong> · ${persona} · ${scenario} · ${userMsgCount} user msgs
      ${hasComplaint ? '<span style="color:#f87171;margin-left:8px;font-size:.7rem;">⚠️ Has complaints</span>' : ''}
    </div>
    <div class="header-btns">
      <button class="dl-btn" onclick="downloadSession('${sessionId}', window._currentMsgs)">⬇ Download This Chat</button>
    </div>
  `;
  window._currentMsgs = msgs;

  const view = document.getElementById('messagesView');
  view.innerHTML = '';

  msgs.forEach(msg => {
    const isComplaint = msg.role === 'user' && detectComplaints(msg.text || '');
    const div = document.createElement('div');
    div.className = `msg-row ${msg.role}`;
    div.innerHTML = `
      <div class="msg-who">${msg.role==='user'?'🙂 User':'🧑 Alex (AI)'}</div>
      <div class="msg-text">${(msg.text||'').replace(/</g,'&lt;').replace(/\n/g,'<br>')}
        ${isComplaint ? '<div class="complaint-tag">⚠️ Possible complaint or problem</div>' : ''}
      </div>
      <div class="msg-time">${formatTime(msg.timestamp)}</div>
    `;
    view.appendChild(div);
  });
  view.scrollTop = view.scrollHeight;
};

loadData();
setInterval(loadData, 15000);
</script>
</body>
</html>
