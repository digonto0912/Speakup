<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeakUp — Free English Partner</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpeakUp">
<meta name="theme-color" content="#e8c97a">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0d0f14;--surface:#141720;--card:#1a1f2e;--border:#262c3e;--accent:#e8c97a;--accent2:#7ab8e8;--text:#e8e4d9;--muted:#6b7280;--user-bubble:#1e2a42;--ai-bubble:#1f1a10;--online:#4ade80;--red:#f87171; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
  .logo{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--accent)}.logo span{font-style:italic;color:var(--text)}
  .persona-selector{display:flex;gap:6px}
  .persona-btn{padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.7rem;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
  .persona-btn.active,.persona-btn:hover{border-color:var(--accent);color:var(--accent);background:#e8c97a12}
  .partner-info{display:flex;align-items:center;gap:10px}
  .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#e8c97a33,#7ab8e833);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.1rem}
  .partner-details{text-align:right}.partner-name{font-size:.82rem;font-weight:500}
  .partner-status{font-size:.7rem;color:var(--online);display:flex;align-items:center;gap:4px;justify-content:flex-end}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--online);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .scenario-bar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
  .scenario-bar::-webkit-scrollbar{display:none}
  .scenario-chip{white-space:nowrap;padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.7rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;flex-shrink:0}
  .scenario-chip.active,.scenario-chip:hover{border-color:var(--accent2);color:var(--accent2);background:#7ab8e812}
  .score-bar{display:flex;justify-content:center;gap:18px;padding:5px;background:var(--card);border-bottom:1px solid var(--border);font-size:.7rem;color:var(--muted);flex-shrink:0}
  .score-bar span{color:var(--accent);font-weight:500}
  #chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  #chat::-webkit-scrollbar{width:3px}#chat::-webkit-scrollbar-thumb{background:var(--border)}
  .message{display:flex;gap:9px;max-width:86%;animation:slideIn .22s ease}
  @keyframes slideIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
  .message.user{align-self:flex-end;flex-direction:row-reverse}.message.ai{align-self:flex-start}
  .msg-avatar{width:28px;height:28px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;margin-top:2px}
  .bubble{padding:11px 15px;border-radius:17px;font-size:.88rem;line-height:1.6}
  .message.ai .bubble{background:var(--ai-bubble);border:1px solid #3a2e1a;border-bottom-left-radius:4px}
  .message.user .bubble{background:var(--user-bubble);border:1px solid #1e3358;border-bottom-right-radius:4px}
  .correction-tag{display:block;margin-top:8px;padding:6px 10px;background:#1a1200;border:1px solid #3d2e00;border-radius:8px;font-size:.74rem;color:var(--accent);line-height:1.5}
  .correction-tag strong{color:#f59e0b}
  .typing-bubble{background:var(--ai-bubble);border:1px solid #3a2e1a;border-radius:17px;border-bottom-left-radius:4px;padding:13px 17px;display:flex;gap:5px;align-items:center}
  .dot-t{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite}
  .dot-t:nth-child(2){animation-delay:.2s}.dot-t:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
  .input-area{padding:12px 14px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
  .input-row{display:flex;gap:9px;align-items:flex-end;max-width:740px;margin:0 auto}
  #userInput{flex:1;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:11px 15px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;resize:none;min-height:46px;max-height:120px;outline:none;transition:border-color .2s;line-height:1.5}
  #userInput:focus{border-color:var(--accent)}#userInput::placeholder{color:var(--muted)}
  #sendBtn{width:46px;height:46px;border-radius:13px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .2s;flex-shrink:0}
  #sendBtn:hover{background:#f0d48a;transform:scale(1.05)}#sendBtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  #micBtn{width:46px;height:46px;border-radius:13px;border:2px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:all .2s;flex-shrink:0}
  #micBtn:hover{border-color:var(--accent2)}
  #micBtn.listening{background:#2a0a0a;border-color:var(--red);animation:micPulse 1s infinite}
  #micBtn.speaking{background:#0a1a2a;border-color:var(--accent2)}
  @keyframes micPulse{0%,100%{box-shadow:0 0 0 4px #f8717122}50%{box-shadow:0 0 0 10px #f8717108}}
  #voiceStatus{text-align:center;font-size:.7rem;margin-top:6px;height:18px;color:var(--muted);transition:color .3s}
  #voiceStatus.listening{color:var(--red)}#voiceStatus.speaking{color:var(--accent2)}
  .waves{display:inline-flex;gap:2px;align-items:center;vertical-align:middle;margin-left:4px}
  .wave{width:3px;border-radius:2px;background:currentColor;animation:wave .8s infinite ease-in-out}
  .wave:nth-child(1){height:6px;animation-delay:0s}.wave:nth-child(2){height:10px;animation-delay:.1s}.wave:nth-child(3){height:14px;animation-delay:.2s}.wave:nth-child(4){height:10px;animation-delay:.3s}.wave:nth-child(5){height:6px;animation-delay:.4s}
  @keyframes wave{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
  .free-badge{background:#0d2010;border:1px solid #1a4a20;color:#4ade80;font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:500}
  .notice-bar{background:#0a1a0a;border-bottom:1px solid #1a3a1a;padding:5px 16px;font-size:.68rem;color:#4ade8099;text-align:center;flex-shrink:0}
  @media(max-width:600px){.persona-selector{display:none}header{padding:9px 12px}}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo">Speak<span>Up</span></div>
    <div class="free-badge">✦ FREE</div>
  </div>
  <div class="persona-selector">
    <button class="persona-btn active" onclick="setPersona('casual',this)">☕ Alex</button>
    <button class="persona-btn" onclick="setPersona('professional',this)">💼 Sarah</button>
    <button class="persona-btn" onclick="setPersona('academic',this)">📚 James</button>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button onclick="newChat()" style="padding:5px 12px;border-radius:20px;border:1px solid #e8c97a44;background:transparent;color:#e8c97a;font-size:.7rem;font-family:'DM Sans',sans-serif;cursor:pointer;">🗑 New</button>
    <div class="partner-info">
      <div class="partner-details">
        <div class="partner-name" id="partnerName">Alex (New York)</div>
        <div class="partner-status"><span class="dot"></span> online</div>
      </div>
      <div class="avatar" id="partnerAvatar">🧑</div>
    </div>
  </div>
</header>
<div class="notice-bar">📊 Chats recorded for improvement · 🎤 Tap mic, speak clearly, wait for Alex to reply</div>
<div class="score-bar">
  <div>Messages: <span id="msgCount">0</span></div>
  <div>Corrections: <span id="corrCount">0</span></div>
  <div>Session: <span id="sessionTime">0:00</span></div>
</div>
<div class="scenario-bar">
  <button class="scenario-chip active" onclick="setScenario(this,'free')">💬 Free Chat</button>
  <button class="scenario-chip" onclick="setScenario(this,'job_interview')">🎯 Job Interview</button>
  <button class="scenario-chip" onclick="setScenario(this,'cafe')">☕ Café</button>
  <button class="scenario-chip" onclick="setScenario(this,'debate')">🗣️ Debate</button>
  <button class="scenario-chip" onclick="setScenario(this,'storytelling')">📖 Story</button>
  <button class="scenario-chip" onclick="setScenario(this,'travel')">✈️ Travel</button>
  <button class="scenario-chip" onclick="setScenario(this,'news')">📰 News</button>
</div>
<div id="chat"></div>
<div class="input-area">
  <div class="input-row">
    <button id="micBtn" onclick="toggleMic()" title="Tap to speak">🎤</button>
    <textarea id="userInput" placeholder="Tap 🎤 to speak, or type here..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div id="voiceStatus">Tap 🎤 — speak clearly — wait for Alex to finish before speaking again</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {apiKey:"AIzaSyAIceqMXYNY5EH_3vTmIbogjb6wJ2CCBxQ",authDomain:"speakup-27de0.firebaseapp.com",projectId:"speakup-27de0",storageBucket:"speakup-27de0.firebasestorage.app",messagingSenderId:"811108429557",appId:"1:811108429557:web:1ad8de2151de43b8f8dfbc"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window._db=db;window._collection=collection;window._addDoc=addDoc;window._serverTimestamp=serverTimestamp;
window._sessionId=localStorage.getItem('speakup_sessionId');
if(!window._sessionId){window._sessionId='user_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);localStorage.setItem('speakup_sessionId',window._sessionId);}
window._logMessage=async function(role,text,persona,scenario){try{await _addDoc(_collection(_db,'messages'),{sessionId:window._sessionId,role,text,persona,scenario,timestamp:_serverTimestamp()});}catch(e){}};
window._firebaseReady=true;if(window._pendingInit)window._pendingInit();
</script>

<script>
const PERSONAS={
  casual:{name:"Alex (New York)",emoji:"🧑",style:"casual American male friend from New York",pitch:0.9,rate:0.88},
  professional:{name:"Sarah (London)",emoji:"👩",style:"professional British female colleague",pitch:1.1,rate:0.88},
  academic:{name:"James (Boston)",emoji:"🧔",style:"calm academic professor from Boston",pitch:0.85,rate:0.85}
};
const SCENARIOS={
  free:"Have a natural free-flowing conversation. Talk about anything.",
  job_interview:"You are the interviewer. Ask professional job interview questions one at a time.",
  cafe:"You're both at a cozy café. Chat about life, hobbies, plans.",
  debate:"Pick an interesting topic and debate it. Encourage them to argue their side.",
  storytelling:"Take turns building a story. You start, they continue, you add more.",
  travel:"You just returned from a trip. Share your experience and ask about theirs.",
  news:"Discuss technology, society, culture. Ask opinions and share yours."
};

let currentPersona='casual',currentScenario='free',conversationHistory=[],msgCount=0,corrCount=0,isLoading=false,isSpeaking=false,isListening=false,recognition=null,voices=[];
let sessionStart=Date.now();

function loadVoices(){voices=window.speechSynthesis.getVoices();}
loadVoices();
if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=loadVoices;

setInterval(()=>{const s=Math.floor((Date.now()-sessionStart)/1000);document.getElementById('sessionTime').textContent=`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;},1000);

function getBestVoice(wantMale){
  // Try to find the best quality voice
  const maleNames=['Google US English Male','Microsoft Guy','Daniel','Alex','Aaron','Fred','Ralph','Thomas'];
  const femaleNames=['Google US English Female','Microsoft Zira','Samantha','Victoria','Karen','Moira'];
  const preferred=wantMale?maleNames:femaleNames;
  for(const name of preferred){const v=voices.find(v=>v.name.includes(name));if(v)return v;}
  // fallback to any English voice
  const en=voices.filter(v=>v.lang&&v.lang.startsWith('en'));
  return en[0]||voices[0]||null;
}

function speakText(text){
  if(!text||!window.speechSynthesis)return;
  const clean=text.replace(/\[CORRECTION:.*?\]/gs,'').replace(/[*_#[\]]/g,'').trim();
  if(!clean)return;
  window.speechSynthesis.cancel();
  isSpeaking=true;
  setVoiceStatus('speaking');
  const p=PERSONAS[currentPersona];
  const wantMale=(currentPersona==='casual'||currentPersona==='academic');
  // Break into sentences to avoid browser cutting off long speech
  const sentences=clean.match(/[^.!?]+[.!?]+/g)||[clean];
  let queue=[...sentences];
  function speakNext(){
    if(queue.length===0){isSpeaking=false;setVoiceStatus('idle');return;}
    const sentence=queue.shift().trim();
    if(!sentence){speakNext();return;}
    const utt=new SpeechSynthesisUtterance(sentence);
    const voice=getBestVoice(wantMale);
    if(voice)utt.voice=voice;
    utt.pitch=p.pitch;
    utt.rate=p.rate;
    utt.volume=1.0;
    utt.onend=speakNext;
    utt.onerror=speakNext;
    window.speechSynthesis.speak(utt);
  }
  // Delay slightly so cancel() clears properly
  setTimeout(speakNext,150);
}

function setVoiceStatus(state){
  const el=document.getElementById('voiceStatus');
  const mic=document.getElementById('micBtn');
  el.className=state;
  const wavesHTML='<span class="waves"><span class="wave"></span><span class="wave"></span><span class="wave"></span><span class="wave"></span><span class="wave"></span></span>';
  if(state==='listening'){
    el.innerHTML='🔴 Listening... speak now '+wavesHTML;
    mic.className='listening';mic.textContent='⏹';
  }else if(state==='speaking'){
    el.innerHTML='🔊 Alex is speaking... tap mic to stop '+wavesHTML;
    mic.className='speaking';mic.textContent='🔇';
  }else{
    el.innerHTML='Tap 🎤 — speak clearly — wait for Alex to finish';
    mic.className='';mic.textContent='🎤';
  }
}

function setupRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();
  r.lang='en-US';r.continuous=false;r.interimResults=true;r.maxAlternatives=1;
  r.onstart=()=>{isListening=true;setVoiceStatus('listening');};
  r.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    document.getElementById('userInput').value=final||interim;
  };
  r.onend=()=>{
    isListening=false;setVoiceStatus('idle');
    const text=document.getElementById('userInput').value.trim();
    if(text)setTimeout(()=>sendMessage(),500);
  };
  r.onerror=(e)=>{isListening=false;setVoiceStatus('idle');if(e.error!=='no-speech')document.getElementById('voiceStatus').textContent='Mic error: '+e.error;};
  return r;
}

function toggleMic(){
  // If Alex is speaking, stop him so user can speak
  if(isSpeaking){window.speechSynthesis.cancel();isSpeaking=false;setVoiceStatus('idle');return;}
  if(isLoading)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Voice not supported. Use Chrome on Android.');return;}
  if(isListening){recognition&&recognition.stop();return;}
  recognition=setupRecognition();
  if(recognition)recognition.start();
}

function saveSession(){
  localStorage.setItem('speakup_history',JSON.stringify(conversationHistory));
  localStorage.setItem('speakup_rendered',document.getElementById('chat').innerHTML);
  localStorage.setItem('speakup_persona',currentPersona);
  localStorage.setItem('speakup_scenario',currentScenario);
  localStorage.setItem('speakup_msgCount',msgCount);
  localStorage.setItem('speakup_corrCount',corrCount);
}
function loadSession(){
  const history=localStorage.getItem('speakup_history');
  const rendered=localStorage.getItem('speakup_rendered');
  const persona=localStorage.getItem('speakup_persona');
  const scenario=localStorage.getItem('speakup_scenario');
  if(history&&rendered){
    conversationHistory=JSON.parse(history);
    msgCount=parseInt(localStorage.getItem('speakup_msgCount')||0);
    corrCount=parseInt(localStorage.getItem('speakup_corrCount')||0);
    document.getElementById('msgCount').textContent=msgCount;
    document.getElementById('corrCount').textContent=corrCount;
    if(persona){currentPersona=persona;document.querySelectorAll('.persona-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes("'"+persona+"'")));document.getElementById('partnerName').textContent=PERSONAS[persona].name;document.getElementById('partnerAvatar').textContent=PERSONAS[persona].emoji;}
    if(scenario){currentScenario=scenario;document.querySelectorAll('.scenario-chip').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes("'"+scenario+"'")));}
    document.getElementById('chat').innerHTML=rendered;
    document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
    return true;
  }
  return false;
}
function clearSession(){['speakup_history','speakup_rendered','speakup_persona','speakup_scenario','speakup_msgCount','speakup_corrCount'].forEach(k=>localStorage.removeItem(k));}

function buildSystemPrompt(){
  const p=PERSONAS[currentPersona];const s=SCENARIOS[currentScenario];
  return `You are ${p.name}, a native English speaker — ${p.style}. The user practices SPOKEN English with you.\nSCENARIO: ${s}\nRULES:\n1. Always respond as ${p.name}, a real human. NEVER act like AI.\n2. Keep replies SHORT — 2 sentences max. This is a VOICE conversation.\n3. NEVER say you're an AI.\n4. If user makes grammar/vocabulary mistake — correct gently at the END:\n   [CORRECTION: "what they said" → "correct version" — why]\n5. Ask one follow-up question. Show personality.\n6. Speak naturally — contractions, reactions like "Oh wow!", "No way!"\n7. Remember everything said.\n8. NO bullet points or lists. Natural sentences only.`;
}

function setPersona(persona,btn){currentPersona=persona;document.querySelectorAll('.persona-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('partnerName').textContent=PERSONAS[persona].name;document.getElementById('partnerAvatar').textContent=PERSONAS[persona].emoji;resetChat();}
function setScenario(btn,scenario){currentScenario=scenario;document.querySelectorAll('.scenario-chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');resetChat();}
function resetChat(){window.speechSynthesis.cancel();clearSession();conversationHistory=[];msgCount=0;corrCount=0;document.getElementById('msgCount').textContent=0;document.getElementById('corrCount').textContent=0;document.getElementById('chat').innerHTML='';startConversation();}

function escapeHtml(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");}
function appendMessage(role,html,isHTML=false){
  const chat=document.getElementById('chat');const p=PERSONAS[currentPersona];
  const div=document.createElement('div');div.className='message '+role;
  const av=document.createElement('div');av.className='msg-avatar';av.textContent=role==='ai'?p.emoji:'🙂';
  const bubble=document.createElement('div');bubble.className='bubble';
  if(isHTML)bubble.innerHTML=html;else bubble.textContent=html;
  div.appendChild(av);div.appendChild(bubble);chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}
function showTyping(){
  const chat=document.getElementById('chat');
  const div=document.createElement('div');div.className='message ai';div.id='typing';
  const av=document.createElement('div');av.className='msg-avatar';av.textContent=PERSONAS[currentPersona].emoji;
  const bubble=document.createElement('div');bubble.className='typing-bubble';
  bubble.innerHTML='<div class="dot-t"></div><div class="dot-t"></div><div class="dot-t"></div>';
  div.appendChild(av);div.appendChild(bubble);chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

function renderAIMessage(text,autoSpeak=true){
  const corrMatch=text.match(/\[CORRECTION:(.*?)\]/s);
  let mainText=text.replace(/\[CORRECTION:.*?\]/s,'').trim();
  let html=escapeHtml(mainText);
  if(corrMatch){corrCount++;document.getElementById('corrCount').textContent=corrCount;html+=`<span class="correction-tag">✏️ <strong>Quick tip:</strong> ${escapeHtml(corrMatch[1].trim())}</span>`;}
  appendMessage('ai',html,true);saveSession();
  if(window._logMessage)window._logMessage('ai',text,currentPersona,currentScenario);
  if(autoSpeak)speakText(mainText);
}

async function startConversation(){
  showTyping();
  const systemMsg={role:"system",content:buildSystemPrompt()};
  const firstMsg={role:"user",content:"Introduce yourself in one short sentence and start the scenario naturally."};
  try{
    const res=await fetch("https://api.llm7.io/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer unused"},body:JSON.stringify({model:"gpt-4o-mini-2024-07-18",messages:[systemMsg,firstMsg],max_tokens:120})});
    const data=await res.json();
    const text=data.choices?.[0]?.message?.content||"Hey! I'm Alex. What's up?";
    removeTyping();conversationHistory.push({role:"assistant",content:text});renderAIMessage(text,true);
  }catch(e){
    removeTyping();const fallback=`Hey! I'm ${PERSONAS[currentPersona].name}. Ready to chat!`;appendMessage('ai',fallback);speakText(fallback);
  }
}

async function sendMessage(){
  const input=document.getElementById('userInput');const text=input.value.trim();
  if(!text||isLoading)return;
  window.speechSynthesis.cancel();isSpeaking=false;
  input.value='';input.style.height='auto';isLoading=true;
  document.getElementById('sendBtn').disabled=true;
  msgCount++;document.getElementById('msgCount').textContent=msgCount;
  appendMessage('user',text);conversationHistory.push({role:"user",content:text});
  if(window._logMessage)window._logMessage('user',text,currentPersona,currentScenario);
  showTyping();
  try{
    const systemMsg={role:"system",content:buildSystemPrompt()};
    const res=await fetch("https://api.llm7.io/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer unused"},body:JSON.stringify({model:"gpt-4o-mini-2024-07-18",messages:[systemMsg,...conversationHistory],max_tokens:180})});
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||"That's interesting! Tell me more.";
    removeTyping();conversationHistory.push({role:"assistant",content:reply});renderAIMessage(reply,true);
  }catch(e){removeTyping();appendMessage('ai',"Something went wrong. Try again!");conversationHistory.pop();}
  isLoading=false;document.getElementById('sendBtn').disabled=false;
}

document.getElementById('userInput').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
document.getElementById('userInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});

function newChat(){
  if(!confirm("Start fresh? Current chat will be cleared."))return;
  window.speechSynthesis.cancel();clearSession();conversationHistory=[];msgCount=0;corrCount=0;
  document.getElementById('msgCount').textContent=0;document.getElementById('corrCount').textContent=0;
  document.getElementById('chat').innerHTML='';startConversation();
}

function init(){if(!loadSession())startConversation();}
if(window._firebaseReady){init();}else{window._pendingInit=init;}
</script>
</body>
