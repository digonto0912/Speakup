<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Buddy — Yusuf</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Buddy">

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#111b21}
body{font-family:'Nunito',sans-serif;color:#e9edef;display:flex;flex-direction:column;height:100dvh}

/* CALL HEADER */
.call-header{
  background:#1f2c34;
  padding:14px 16px 12px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  flex-shrink:0;border-bottom:1px solid #2a3942;
}
.buddy-ring{
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,#00a884,#025c4c);
  display:flex;align-items:center;justify-content:center;
  font-size:1.7rem;position:relative;
  box-shadow:0 0 0 3px #2a3942;transition:box-shadow 0.3s;
}
.buddy-ring.speaking{
  box-shadow:0 0 0 4px #00a884,0 0 22px rgba(0,168,132,0.45);
  animation:rp 1.2s infinite;
}
@keyframes rp{0%,100%{box-shadow:0 0 0 4px #00a884,0 0 22px rgba(0,168,132,0.4)}50%{box-shadow:0 0 0 8px rgba(0,168,132,0.3),0 0 30px rgba(0,168,132,0.2)}}
.buddy-name-big{font-size:1.1rem;font-weight:700;color:#e9edef}
.buddy-sub{font-size:0.65rem;color:#8696a0;letter-spacing:0.3px}
.call-status{font-size:0.7rem;color:#8696a0;min-height:15px}
.call-status.listening{color:#f15c6d}
.call-status.speaking{color:#53bdeb}
.call-status.thinking{color:#ffd279}

/* PROGRESS BAR */
.progress-wrap{
  width:100%;padding:8px 16px;
  background:#111b21;border-bottom:1px solid #2a3942;
  flex-shrink:0;
}
.progress-top{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:5px;
}
.progress-label{font-size:0.68rem;color:#8696a0;font-weight:600}
.progress-pct{font-size:0.78rem;font-weight:700;color:#00a884}
.progress-bar-bg{
  width:100%;height:6px;background:#2a3942;border-radius:3px;overflow:hidden;
}
.progress-bar-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,#00a884,#34d399);
  transition:width 1.2s cubic-bezier(0.4,0,0.2,1);
  min-width:2px;
}
.progress-detail{
  display:flex;justify-content:space-between;margin-top:4px;
}
.pd-item{font-size:0.6rem;color:#8696a0;text-align:center}
.pd-item span{display:block;font-size:0.68rem;font-weight:700;color:#e9edef}

/* Scenario row */
.scenario-row{
  background:#111b21;padding:6px 10px;
  display:flex;gap:5px;overflow-x:auto;flex-shrink:0;
  border-bottom:1px solid #2a3942;scrollbar-width:none;
}
.scenario-row::-webkit-scrollbar{display:none}
.s-chip{
  white-space:nowrap;padding:3px 10px;border-radius:20px;
  border:1px solid #2a3942;background:transparent;
  color:#8696a0;font-size:0.65rem;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:600;transition:all 0.2s;flex-shrink:0;
}
.s-chip.active{border-color:#00a884;color:#00a884;background:rgba(0,168,132,0.08)}

/* CHAT */
#chat{
  flex:1;overflow-y:auto;padding:10px 10px 4px;
  display:flex;flex-direction:column;gap:4px;
  background:#111b21;scrollbar-width:none;
}
#chat::-webkit-scrollbar{display:none}

.msg{display:flex;max-width:80%}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end;justify-content:flex-end}
.bubble{padding:7px 11px 5px;border-radius:7px;font-size:0.875rem;line-height:1.55;}
.msg.ai .bubble{background:#1f2c34;border-top-left-radius:0;color:#e9edef}
.msg.user .bubble{background:#005c4b;border-top-right-radius:0;color:#e9edef}
.msg-time{font-size:0.58rem;color:#8696a0;float:right;margin-left:8px;margin-top:2px}

/* Natural interruption correction — like Yusuf would do */
.fix-tag{
  display:block;clear:both;margin-top:6px;padding:5px 9px;
  background:rgba(0,168,132,0.07);border-left:2px solid #00a884;
  border-radius:3px;font-size:0.72rem;color:#34d399;line-height:1.5;
}

/* Typing */
.typing-msg{align-self:flex-start}
.typing-bubble{
  background:#1f2c34;border-radius:7px;border-top-left-radius:0;
  padding:11px 14px;display:flex;gap:4px;align-items:center;
}
.td{width:6px;height:6px;border-radius:50%;background:#00a884;animation:td 1.3s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}

/* CALL BAR */
.call-bar{
  background:#1f2c34;border-top:1px solid #2a3942;
  padding:12px 18px 18px;flex-shrink:0;
}
.waveform{
  display:flex;justify-content:center;align-items:center;
  gap:3px;height:26px;margin-bottom:11px;opacity:0;transition:opacity 0.3s;
}
.waveform.active{opacity:1}
.bar{width:3px;border-radius:3px;background:#00a884;animation:ba 0.7s infinite ease-in-out;}
.bar:nth-child(1){height:6px;animation-delay:0s}.bar:nth-child(2){height:12px;animation-delay:.07s}
.bar:nth-child(3){height:20px;animation-delay:.14s}.bar:nth-child(4){height:26px;animation-delay:.21s}
.bar:nth-child(5){height:20px;animation-delay:.28s}.bar:nth-child(6){height:12px;animation-delay:.35s}
.bar:nth-child(7){height:6px;animation-delay:.42s}
.waveform.listening .bar{background:#f15c6d}
.waveform.speaking .bar{background:#53bdeb}
@keyframes ba{0%,100%{transform:scaleY(.25)}50%{transform:scaleY(1)}}

.mic-row{display:flex;align-items:center;justify-content:center;gap:22px}
#micBtn{
  width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;
  background:#00a884;display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;box-shadow:0 3px 14px rgba(0,168,132,0.35);transition:all 0.25s;
}
#micBtn.listening{background:#f15c6d;box-shadow:0 3px 14px rgba(241,92,109,0.4);animation:ma 1.1s infinite}
#micBtn.speaking{background:#53bdeb;box-shadow:0 3px 14px rgba(83,189,235,0.35)}
#micBtn.disabled-look{background:#2a3942;box-shadow:none}
@keyframes ma{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}

.side-btn{
  width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;
  background:#2a3942;color:#8696a0;
  display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all 0.2s;
}
.side-btn.active{background:#004a3a;color:#00a884}

.type-area{display:none;margin-top:10px;gap:8px;align-items:flex-end}
.type-area.show{display:flex}
#userInput{
  flex:1;background:#2a3942;border:none;border-radius:20px;
  padding:9px 14px;color:#e9edef;
  font-family:'Nunito',sans-serif;font-size:0.875rem;
  resize:none;min-height:40px;max-height:88px;outline:none;line-height:1.5;
}
#userInput::placeholder{color:#8696a0}
#sendBtn{
  width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
  background:#00a884;color:#fff;font-size:0.9rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
#sendBtn:disabled{opacity:0.4;cursor:not-allowed}

.call-info{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:0 2px}
.persona-row{display:flex;gap:5px}
.p-btn{
  padding:3px 9px;border-radius:20px;border:1px solid #2a3942;background:transparent;
  color:#8696a0;font-size:0.62rem;font-family:'Nunito',sans-serif;cursor:pointer;font-weight:600;transition:all 0.2s;
}
.p-btn.active{border-color:#00a884;color:#00a884}
.new-btn{font-size:0.62rem;color:#8696a0;background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif}

.ghost-msg{align-self:flex-end;max-width:80%;opacity:0.4}
.ghost-msg .bubble{background:#005c4b;border-top-right-radius:0;font-style:italic}
</style>
</head>
<body>

<div class="call-header">
  <div class="buddy-ring" id="buddyRing"><span id="buddyEmoji">🧑</span></div>
  <div class="buddy-name-big" id="buddyName">Yusuf</div>
  <div class="buddy-sub">Your Bengali Brother · Always Here</div>
  <div class="call-status" id="callStatus">tap mic and start talking</div>
</div>

<!-- REAL PROGRESS -->
<div class="progress-wrap">
  <div class="progress-top">
    <div class="progress-label">Your English Journey</div>
    <div class="progress-pct" id="pctLabel">0%</div>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-detail">
    <div class="pd-item"><span id="statSessions">0</span>sessions</div>
    <div class="pd-item"><span id="statMsgs">0</span>messages</div>
    <div class="pd-item"><span id="statFixes">0</span>corrections</div>
    <div class="pd-item"><span id="statStreak">0</span>day streak</div>
  </div>
</div>

<div class="scenario-row">
  <button class="s-chip active" onclick="setScenario(this,'free')">💬 Just Talk</button>
  <button class="s-chip" onclick="setScenario(this,'job_interview')">🎯 Interview</button>
  <button class="s-chip" onclick="setScenario(this,'debate')">🔥 Debate</button>
  <button class="s-chip" onclick="setScenario(this,'cafe')">☕ Chill</button>
  <button class="s-chip" onclick="setScenario(this,'storytelling')">📖 Story</button>
  <button class="s-chip" onclick="setScenario(this,'travel')">✈️ Travel</button>
  <button class="s-chip" onclick="setScenario(this,'news')">🌍 World</button>
</div>

<div id="chat"></div>

<div class="call-bar">
  <div class="waveform" id="waveform">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <div class="mic-row">
    <button class="side-btn" id="typeBtn" onclick="toggleType()">⌨️</button>
    <button id="micBtn" onclick="toggleMic()">🎤</button>
    <button class="side-btn" onclick="newChat()">🔄</button>
  </div>
  <div class="type-area" id="typeArea">
    <textarea id="userInput" placeholder="Type here..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendTyped()">➤</button>
  </div>
  <div class="call-info">
    <div class="persona-row">
      <button class="p-btn active" onclick="setPersona('yusuf',this)">🧑 Yusuf</button>
      <button class="p-btn" onclick="setPersona('professional',this)">👩 Sarah</button>
      <button class="p-btn" onclick="setPersona('academic',this)">🎓 James</button>
    </div>
    <button class="new-btn" onclick="newChat()">new chat 🔄</button>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,addDoc,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyAIceqMXYNY5EH_3vTmIbogjb6wJ2CCBxQ",authDomain:"speakup-27de0.firebaseapp.com",projectId:"speakup-27de0",storageBucket:"speakup-27de0.firebasestorage.app",messagingSenderId:"811108429557",appId:"1:811108429557:web:1ad8de2151de43b8f8dfbc"};
const app=initializeApp(cfg);const db=getFirestore(app);
window._db=db;window._col=collection;window._add=addDoc;window._ts=serverTimestamp;
window._sid=localStorage.getItem('buddy_sid');
if(!window._sid){window._sid='u_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);localStorage.setItem('buddy_sid',window._sid);}
window._log=async(role,text,persona,scenario)=>{try{await _add(_col(_db,'messages'),{sessionId:_sid,role,text,persona,scenario,timestamp:_ts()});}catch(e){}};
window._fbReady=true;if(window._fbInit)window._fbInit();
</script>

<script>
// ── PERSONAS ──
const P={
  yusuf:{
    name:"Yusuf",emoji:"🧑",
    pitch:0.97,rate:0.91,
    // Yusuf is Bengali, he knows Fadul personally, warm older-brother energy
    systemPrompt:`You are Yusuf — a real Bengali man, Fadul's older brother. You both grew up together, worked in the same office, and you always helped him improve his English. You love him like a brother. You are warm, direct, real.

YOUR BROTHER-STYLE CORRECTIONS:
- When Fadul says something wrong mid-sentence, you interrupt naturally like: "Bhai wait — don't say 'what much possible', say 'as soon as possible'. Go on."
- You remember his common mistakes. He used to translate from Bangla directly into English — that's his main problem.
- You don't correct small things. Only when it will really help him.
- After correcting, you continue the conversation warmly — you don't make it a lesson.
- You speak a little Bengali flavour — sometimes "bhai", "yaar", "arre" — because that's how you two talked.`,
    openers:[
      "Arre bhai, finally! I missed talking to you. What's going on in your life man?",
      "Yaar, I was just thinking about you. How are things? Job going okay?",
      "Bhai! Long time. Tell me everything — what's new?",
      "Arre Fadul, how are you? I feel like we haven't talked in ages man."
    ]
  },
  professional:{
    name:"Sarah",emoji:"👩",
    pitch:1.08,rate:0.91,
    systemPrompt:`You are Sarah, a warm British professional mentor. You help with career English and interview preparation. You are encouraging and direct — never formal or robotic.`,
    openers:[
      "Hey, good to see you. What do you want to work on today?",
      "Right, let's get into it. What's the part of interviews that worries you most?",
      "I was thinking — confidence is everything. What do you want to improve today?"
    ]
  },
  academic:{
    name:"James",emoji:"🎓",
    pitch:0.92,rate:0.87,
    systemPrompt:`You are James, a calm thoughtful professor. You speak slowly and clearly. You open interesting topics and make people feel intelligent.`,
    openers:[
      "I've been thinking — what do you believe actually makes a person successful?",
      "Let's talk about something real today. What's one thing you're genuinely struggling with?",
      "Most people never ask themselves what they really want. So — what do you want?"
    ]
  }
};

const S={
  free:"Have a natural warm conversation. React genuinely. Share your own thoughts. Let it flow.",
  job_interview:"Help practice for a job interview. ONE question at a time. Warm and encouraging.",
  debate:"Pick a fun topic, debate it playfully. Challenge thinking. Keep it fun.",
  cafe:"Very relaxed. Talk about life, random things, feelings.",
  storytelling:"Build a story one sentence at a time. You start. React with excitement.",
  travel:"Talk about trips and places. Ask about their dream destination.",
  news:"Discuss world topics. Share genuine opinions. Real conversation."
};

// ── STATE ──
let persona='yusuf',scenario='free';
let history=[],sessionMsgCount=0;
let isLoading=false,isSpeaking=false,isListening=false;
let recognition=null,voices=[];
let typeMode=false;

// ── PERSISTENT PROGRESS (never resets) ──
// Stored across ALL sessions in localStorage
// Score is calculated from: total messages, total corrections learned, sessions count, streak
function loadProgress(){
  try{
    return JSON.parse(localStorage.getItem('buddy_progress')||'{}');
  }catch(e){return {};}
}
function saveProgress(p){
  try{localStorage.setItem('buddy_progress',JSON.stringify(p));}catch(e){}
}

function calcScore(prog){
  // Weighted real score — starts low, grows slowly, never jumps to 100
  // Max realistic score after heavy use is ~85%. 100% = perfect native speaker
  const sessions = prog.totalSessions||0;
  const msgs = prog.totalMsgs||0;
  const fixes = prog.totalFixes||0;
  const streak = prog.streak||0;

  // Each component contributes to score growth
  // Sessions: up to 20 points (1pt per session, max 20)
  const sessionScore = Math.min(sessions * 1, 20);
  // Messages: up to 30 points (1pt per 5 messages)
  const msgScore = Math.min(msgs * 0.2, 30);
  // Fixes learned: up to 25 points (corrections mean you're improving)
  const fixScore = Math.min(fixes * 0.8, 25);
  // Streak: up to 15 points (consistency is key)
  const streakScore = Math.min(streak * 1.5, 15);

  const raw = sessionScore + msgScore + fixScore + streakScore;
  // Never show 0 after first session, never show 100 until truly earned
  if(sessions===0) return 0;
  if(sessions===1 && msgs<3) return 3; // first time, give a tiny boost
  return Math.min(Math.round(raw), 94); // 94 max — 100 is native speaker
}

function updateProgressUI(){
  const prog=loadProgress();
  const pct=calcScore(prog);
  document.getElementById('pctLabel').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('statSessions').textContent=prog.totalSessions||0;
  document.getElementById('statMsgs').textContent=prog.totalMsgs||0;
  document.getElementById('statFixes').textContent=prog.totalFixes||0;
  document.getElementById('statStreak').textContent=prog.streak||0;
}

function recordSessionStart(){
  const prog=loadProgress();
  prog.totalSessions=(prog.totalSessions||0)+1;
  // Streak: check if last session was yesterday or today
  const today=new Date().toDateString();
  const lastDay=prog.lastDay||'';
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(lastDay===today){
    // same day, no streak change
  } else if(lastDay===yesterday){
    prog.streak=(prog.streak||0)+1;
  } else if(lastDay===''){
    prog.streak=1;
  } else {
    prog.streak=1; // streak broken, restart
  }
  prog.lastDay=today;
  saveProgress(prog);
  updateProgressUI();
}

function recordMessage(){
  const prog=loadProgress();
  prog.totalMsgs=(prog.totalMsgs||0)+1;
  saveProgress(prog);
  updateProgressUI();
}

function recordFix(){
  const prog=loadProgress();
  prog.totalFixes=(prog.totalFixes||0)+1;
  saveProgress(prog);
  updateProgressUI();
}

// ── VOICE ──
function loadVoices(){voices=window.speechSynthesis.getVoices();}
loadVoices();
if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=loadVoices;

function getVoice(male){
  const m=['Google US English','Microsoft Guy Online','Microsoft David','Daniel','Alex','Aaron'];
  const f=['Google UK English Female','Google US English Female','Microsoft Zira Online','Samantha'];
  const list=male?m:f;
  for(const n of list){const v=voices.find(v=>v.name===n||v.name.startsWith(n));if(v)return v;}
  const prem=voices.find(v=>v.lang&&v.lang.startsWith('en')&&(v.name.includes('Enhanced')||v.name.includes('Premium')||v.name.includes('Online')));
  if(prem)return prem;
  return voices.find(v=>v.lang&&v.lang.startsWith('en'))||voices[0]||null;
}

function speak(text,cb){
  if(!text||!window.speechSynthesis){cb&&cb();return;}
  const clean=text.replace(/\[FIX:.*?\]/gs,'').replace(/[*_#\[\]]/g,'').replace(/\s+/g,' ').trim();
  if(!clean){cb&&cb();return;}
  window.speechSynthesis.cancel();
  isSpeaking=true;setStatus('speaking');
  document.getElementById('buddyRing').classList.add('speaking');

  const utt=new SpeechSynthesisUtterance(clean);
  const v=getVoice(persona!=='professional');
  if(v)utt.voice=v;
  utt.pitch=P[persona].pitch;utt.rate=P[persona].rate;utt.volume=1;utt.lang='en-US';

  utt.onend=()=>{
    isSpeaking=false;
    document.getElementById('buddyRing').classList.remove('speaking');
    setStatus('idle');cb&&cb();
    if(!typeMode)setTimeout(()=>startListening(),650);
  };
  utt.onerror=(e)=>{
    if(e.error==='interrupted')return;
    isSpeaking=false;
    document.getElementById('buddyRing').classList.remove('speaking');
    setStatus('idle');cb&&cb();
  };
  setTimeout(()=>window.speechSynthesis.speak(utt),80);
  const ka=setInterval(()=>{if(!isSpeaking){clearInterval(ka);return;}if(window.speechSynthesis.paused)window.speechSynthesis.resume();},8000);
}

function setStatus(s){
  const el=document.getElementById('callStatus');
  const btn=document.getElementById('micBtn');
  const wf=document.getElementById('waveform');
  el.className='call-status';wf.className='waveform';btn.className='';
  if(s==='listening'){
    el.className='call-status listening';el.textContent='Listening...';
    btn.className='listening';btn.textContent='⏹';
    wf.className='waveform active listening';
  }else if(s==='speaking'){
    el.className='call-status speaking';el.textContent=P[persona].name+' is talking...';
    btn.className='speaking';btn.textContent='🔇';
    wf.className='waveform active speaking';
  }else if(s==='thinking'){
    el.className='call-status thinking';el.textContent='thinking...';
    btn.className='disabled-look';btn.textContent='💭';
  }else{
    el.textContent='tap mic and start talking';btn.textContent='🎤';
  }
}

// ── RECOGNITION ──
function buildRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();
  r.lang='en-US';r.continuous=false;r.interimResults=true;r.maxAlternatives=1;
  let ft='';
  r.onstart=()=>{isListening=true;setStatus('listening');};
  r.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)ft+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    showGhost(ft||interim);
  };
  r.onend=()=>{
    isListening=false;removeGhost();
    const text=ft.trim();ft='';setStatus('idle');
    if(text){processMessage(text);}
    else if(!isLoading&&!isSpeaking)setTimeout(()=>startListening(),1100);
  };
  r.onerror=(e)=>{
    isListening=false;removeGhost();ft='';setStatus('idle');
    if(e.error==='no-speech'&&!isLoading&&!isSpeaking)setTimeout(()=>startListening(),1100);
  };
  return r;
}

function startListening(){
  if(isListening||isLoading||isSpeaking||typeMode)return;
  recognition=buildRec();
  if(recognition){try{recognition.start();}catch(e){}}
}

function toggleMic(){
  if(isSpeaking){
    window.speechSynthesis.cancel();isSpeaking=false;
    document.getElementById('buddyRing').classList.remove('speaking');
    setStatus('idle');setTimeout(()=>startListening(),300);return;
  }
  if(isListening){recognition&&recognition.stop();return;}
  if(isLoading)return;
  startListening();
}

function showGhost(text){
  let g=document.getElementById('ghost');
  if(!g){
    const chat=document.getElementById('chat');
    g=document.createElement('div');g.id='ghost';g.className='msg ghost-msg';
    const b=document.createElement('div');b.className='bubble';b.id='ghost-text';
    g.appendChild(b);chat.appendChild(g);
  }
  document.getElementById('ghost-text').textContent=text;
  document.getElementById('chat').scrollTop=99999;
}
function removeGhost(){const g=document.getElementById('ghost');if(g)g.remove();}

function toggleType(){
  typeMode=!typeMode;
  document.getElementById('typeArea').classList.toggle('show',typeMode);
  document.getElementById('typeBtn').classList.toggle('active',typeMode);
  if(typeMode&&isListening)recognition&&recognition.stop();
  if(typeMode)setTimeout(()=>document.getElementById('userInput').focus(),100);
}

function sendTyped(){
  const input=document.getElementById('userInput');
  const text=input.value.trim();
  if(!text||isLoading)return;
  input.value='';input.style.height='auto';
  processMessage(text);
}

async function processMessage(text){
  if(isLoading)return;
  window.speechSynthesis.cancel();isSpeaking=false;
  isLoading=true;document.getElementById('sendBtn').disabled=true;
  sessionMsgCount++;
  recordMessage();
  addMsg('user',text,false);
  history.push({role:'user',content:text});
  if(window._log)window._log('user',text,persona,scenario);
  saveSession();setStatus('thinking');showTyping();

  try{
    const res=await fetch('https://api.llm7.io/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer unused'},
      body:JSON.stringify({
        model:'gpt-4o-mini-2024-07-18',
        messages:[{role:'system',content:buildPrompt()},...history],
        max_tokens:160
      })
    });
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||"Bhai, say it again?";
    removeTyping();
    history.push({role:'assistant',content:reply});
    renderReply(reply);
  }catch(e){
    removeTyping();setStatus('idle');isLoading=false;
    document.getElementById('sendBtn').disabled=false;
    addMsg('ai',"Connection issue bhai. Try again.",false);
  }
}

function buildPrompt(){
  const p=P[persona];
  const sc=S[scenario];
  return `${p.systemPrompt}

WHAT YOU'RE DOING NOW: ${sc}

CRITICAL RULES — never break:
1. MAX 2 short sentences. This is a voice call. Short = natural.
2. NEVER say "I'm sorry", "I apologize", "Great question", "How can I help", "As an AI".
3. NEVER echo or repeat back what they just said before your reply.
4. NEVER do "repeat after me" or "now you say it" drills.
5. NEVER ask random disconnected questions.
6. React to their EMOTION first. If frustrated, acknowledge it. If excited, match it.
7. If they say "shut up" or get annoyed — laugh it off like a brother, change topic naturally.
8. NEVER give the same reply twice. Every response must be fresh.
9. NEVER correct anything that is not genuinely wrong. Casual English is fine.
10. NEVER correct more than ONE thing per reply.
11. When you do correct, do it like a brother interrupting mid-conversation — natural, warm, quick. Then continue the chat.
    Format: [FIX: "wrong phrase" → "right phrase" — short reason]
12. After correcting, always continue the conversation — never make it a grammar lesson.`;
}

// ── RENDER ──
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function now(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

function renderReply(text){
  const fixMatch=text.match(/\[FIX:(.*?)\]/s);
  const main=text.replace(/\[FIX:.*?\]/s,'').trim();
  let html=escHtml(main);
  if(fixMatch){
    recordFix();
    html+=`<span class="fix-tag">💬 ${escHtml(fixMatch[1].trim())}</span>`;
  }
  addMsg('ai',html,true);
  saveSession();
  if(window._log)window._log('ai',text,persona,scenario);
  isLoading=false;document.getElementById('sendBtn').disabled=false;
  speak(main);
}

function addMsg(role,content,isHTML=false){
  const chat=document.getElementById('chat');
  const wrap=document.createElement('div');wrap.className='msg '+role;
  const b=document.createElement('div');b.className='bubble';
  if(isHTML)b.innerHTML=content;else b.textContent=content;
  const t=document.createElement('span');t.className='msg-time';t.textContent=now();
  b.appendChild(t);wrap.appendChild(b);chat.appendChild(wrap);
  chat.scrollTop=99999;
}
function showTyping(){
  const chat=document.getElementById('chat');
  const w=document.createElement('div');w.className='typing-msg';w.id='typing';
  const b=document.createElement('div');b.className='typing-bubble';
  b.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';
  w.appendChild(b);chat.appendChild(w);chat.scrollTop=99999;
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

// ── PERSONA & SCENARIO ──
function setPersona(p,btn){
  persona=p;
  document.querySelectorAll('.p-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('buddyName').textContent=P[p].name;
  document.getElementById('buddyEmoji').textContent=P[p].emoji;
  resetChat();
}
function setScenario(btn,sc){
  scenario=sc;
  document.querySelectorAll('.s-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  resetChat();
}
function resetChat(){
  window.speechSynthesis.cancel();
  if(isListening)try{recognition&&recognition.stop();}catch(e){}
  isSpeaking=false;isListening=false;isLoading=false;
  clearSessionStorage();
  history=[];sessionMsgCount=0;
  document.getElementById('chat').innerHTML='';
  setStatus('idle');
  window._convoStarted=false;
  startConvo();
}

async function startConvo(){
  if(window._convoStarted)return;
  window._convoStarted=true;
  recordSessionStart(); // count this as a new session
  showTyping();setStatus('thinking');
  const opener=P[persona].openers[Math.floor(Math.random()*P[persona].openers.length)];
  try{
    const res=await fetch('https://api.llm7.io/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer unused'},
      body:JSON.stringify({
        model:'gpt-4o-mini-2024-07-18',
        messages:[
          {role:'system',content:buildPrompt()},
          {role:'user',content:`Open the conversation warmly. Use this feeling: "${opener}" — say it naturally. One or two sentences only.`}
        ],max_tokens:80
      })
    });
    const data=await res.json();
    const text=data.choices?.[0]?.message?.content||opener;
    removeTyping();
    history.push({role:'assistant',content:text});
    renderReply(text);
  }catch(e){
    removeTyping();
    addMsg('ai',opener,false);
    speak(opener);
    history.push({role:'assistant',content:opener});
    isLoading=false;
  }
}

// ── SESSION (current chat only) ──
function saveSession(){
  try{
    localStorage.setItem('b_h',JSON.stringify(history));
    localStorage.setItem('b_r',document.getElementById('chat').innerHTML);
    localStorage.setItem('b_p',persona);localStorage.setItem('b_s',scenario);
  }catch(e){}
}
function loadSession(){
  try{
    const h=localStorage.getItem('b_h'),r=localStorage.getItem('b_r');
    if(!h||!r)return false;
    history=JSON.parse(h);
    const p=localStorage.getItem('b_p');
    const s=localStorage.getItem('b_s');
    if(p){
      persona=p;
      document.querySelectorAll('.p-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes("'"+p+"'")));
      document.getElementById('buddyName').textContent=P[p].name;
      document.getElementById('buddyEmoji').textContent=P[p].emoji;
    }
    if(s){
      scenario=s;
      document.querySelectorAll('.s-chip').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes("'"+s+"'")));
    }
    document.getElementById('chat').innerHTML=r;
    document.getElementById('chat').scrollTop=99999;
    window._convoStarted=true;
    return true;
  }catch(e){return false;}
}
function clearSessionStorage(){
  ['b_h','b_r','b_p','b_s'].forEach(k=>localStorage.removeItem(k));
  window._convoStarted=false;
}
function newChat(){
  if(!confirm('Start a new chat with '+P[persona].name+'?'))return;
  resetChat();
}

document.getElementById('userInput').addEventListener('input',function(){
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,88)+'px';
});
document.getElementById('userInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendTyped();}
});

function init(){
  updateProgressUI(); // always show real progress on load
  if(!loadSession()){startConvo();}
  else{setStatus('idle');}
}
if(window._fbReady){init();}else{window._fbInit=init;}
</script>
</body>
</html>
