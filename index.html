<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Buddy — English Coach</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Buddy">
<meta name="theme-color" content="#111b21">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#111b21}
body{font-family:'Nunito',sans-serif;color:#e9edef;display:flex;flex-direction:column;height:100dvh}

/* HEADER */
.top-bar{
  background:#1f2c34;padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;border-bottom:1px solid #2a3942;
}
.buddy-pill{display:flex;align-items:center;gap:8px}
.buddy-face{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,#00a884,#025c4c);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  box-shadow:0 0 12px rgba(0,168,132,0.3);position:relative;
}
.buddy-face.speaking::after{
  content:'';position:absolute;width:100%;height:100%;border-radius:50%;
  border:3px solid #00a884;animation:speakRing 1s infinite ease-out;
}
@keyframes speakRing{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.6);opacity:0}}
.buddy-info .name{font-size:.9rem;font-weight:700;color:#e9edef}
.buddy-info .status{font-size:.65rem;color:#8696a0}
.buddy-info .status.on{color:#00a884}
.buddy-info .status.speaking{color:#53bdeb}
.buddy-info .status.thinking{color:#ffd279}
.buddy-info .status.listening{color:#f15c6d}

/* SCORE STRIP */
.score-strip{
  background:#111b21;padding:8px 14px;
  display:flex;gap:0;border-bottom:1px solid #2a3942;flex-shrink:0;
}
.sc{flex:1;text-align:center;border-right:1px solid #2a3942}
.sc:last-child{border-right:none}
.sc-num{font-size:1.1rem;font-weight:800;color:#00a884}
.sc-lbl{font-size:.58rem;color:#8696a0;margin-top:1px;letter-spacing:.3px}

/* MODE TABS */
.mode-tabs{
  background:#1f2c34;padding:6px 12px;
  display:flex;gap:6px;border-bottom:1px solid #2a3942;flex-shrink:0;
}
.m-tab{
  padding:5px 13px;border-radius:20px;border:1px solid #2a3942;
  background:transparent;color:#8696a0;font-size:.68rem;
  font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:all .2s;
}
.m-tab.active{border-color:#00a884;color:#00a884;background:rgba(0,168,132,.1)}

/* CHAT */
#chat{
  flex:1;overflow-y:auto;padding:10px 12px 6px;
  display:flex;flex-direction:column;gap:6px;
  background:#111b21;scrollbar-width:none;
}
#chat::-webkit-scrollbar{display:none}

.msg{display:flex;max-width:86%}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.bubble{padding:8px 12px 6px;border-radius:8px;font-size:.875rem;line-height:1.6}
.msg.ai .bubble{background:#1f2c34;border-top-left-radius:0;color:#e9edef}
.msg.user .bubble{background:#005c4b;border-top-right-radius:0;color:#e9edef}
.msg-time{font-size:.58rem;color:#8696a0;float:right;margin-left:8px;margin-top:4px}

/* CORRECTION CARD — stops the flow */
.correction-card{
  background:#1a1200;border:1px solid #3d2e00;border-radius:10px;
  padding:10px 12px;margin:2px 0;align-self:stretch;
  animation:cardIn .3s ease;
}
@keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.correction-card .cc-label{font-size:.62rem;color:#ffd279;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.correction-card .wrong{color:#f87171;font-size:.82rem;text-decoration:line-through;margin-bottom:3px}
.correction-card .right{color:#4ade80;font-size:.88rem;font-weight:600;margin-bottom:4px}
.correction-card .why{font-size:.72rem;color:#8696a0;margin-bottom:8px}
.repeat-btn{
  width:100%;padding:7px;border-radius:8px;border:none;cursor:pointer;
  background:#005c4b;color:#00a884;font-family:'Nunito',sans-serif;
  font-size:.78rem;font-weight:700;transition:all .2s;
}
.repeat-btn:hover{background:#006d5a}
.repeat-btn.done{background:#0a2a1a;color:#4ade80}

/* REPORT CARD */
.report-card{
  background:#1f2c34;border:1px solid #2a3942;border-radius:12px;
  padding:14px;margin:4px 0;align-self:stretch;
}
.report-card .r-title{font-size:.8rem;font-weight:800;color:#00a884;margin-bottom:10px;letter-spacing:.3px}
.report-card .r-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #2a3942;font-size:.75rem}
.report-card .r-row:last-child{border-bottom:none}
.report-card .r-key{color:#8696a0}
.report-card .r-val{color:#e9edef;font-weight:600}
.fluency-bar{height:6px;background:#2a3942;border-radius:3px;margin-top:8px;overflow:hidden}
.fluency-fill{height:100%;background:linear-gradient(90deg,#00a884,#4ade80);border-radius:3px;transition:width 1s ease}

/* TYPING */
.typing-wrap{align-self:flex-start}
.typing-bubble{background:#1f2c34;border-radius:8px;border-top-left-radius:0;padding:12px 16px;display:flex;gap:4px;align-items:center}
.td{width:7px;height:7px;border-radius:50%;background:#00a884;animation:td 1.4s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-6px);opacity:1}}

/* CALL BAR */
.call-bar{
  background:#1f2c34;border-top:1px solid #2a3942;
  padding:14px 20px 20px;flex-shrink:0;
}
.waveform{display:flex;justify-content:center;align-items:center;gap:3px;height:28px;margin-bottom:12px;opacity:0;transition:opacity .3s}
.waveform.on{opacity:1}
.bar{width:3px;border-radius:3px;background:#00a884;animation:bv .8s infinite ease-in-out}
.bar:nth-child(1){height:6px;animation-delay:0s}.bar:nth-child(2){height:12px;animation-delay:.08s}
.bar:nth-child(3){height:20px;animation-delay:.16s}.bar:nth-child(4){height:28px;animation-delay:.24s}
.bar:nth-child(5){height:20px;animation-delay:.32s}.bar:nth-child(6){height:12px;animation-delay:.40s}
.bar:nth-child(7){height:6px;animation-delay:.48s}
.waveform.listening .bar{background:#f15c6d}
.waveform.speaking .bar{background:#53bdeb}
@keyframes bv{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}

.mic-row{display:flex;align-items:center;justify-content:center;gap:22px}
#micBtn{
  width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;
  background:#00a884;font-size:1.45rem;
  box-shadow:0 4px 18px rgba(0,168,132,.35);transition:all .25s;
  display:flex;align-items:center;justify-content:center;
}
#micBtn.listening{background:#f15c6d;box-shadow:0 4px 18px rgba(241,92,109,.4);animation:mp 1.2s infinite}
#micBtn.speaking{background:#53bdeb;box-shadow:0 4px 18px rgba(83,189,235,.35)}
#micBtn.off{background:#2a3942;box-shadow:none}
@keyframes mp{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}

.side-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;background:#2a3942;color:#8696a0;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.side-btn:hover{background:#374d5a;color:#e9edef}
.side-btn.on{background:#005c4b;color:#00a884}

.type-area{display:none;margin-top:10px;gap:8px;align-items:flex-end}
.type-area.show{display:flex}
#userInput{flex:1;background:#2a3942;border:none;border-radius:22px;padding:10px 16px;color:#e9edef;font-family:'Nunito',sans-serif;font-size:.875rem;resize:none;min-height:42px;max-height:90px;outline:none;line-height:1.5}
#userInput::placeholder{color:#8696a0}
#sendBtn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;background:#00a884;color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#sendBtn:disabled{opacity:.4;cursor:not-allowed}

.bottom-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:0 2px}
.p-row{display:flex;gap:5px}
.p-btn{padding:3px 9px;border-radius:20px;border:1px solid #2a3942;background:transparent;color:#8696a0;font-size:.63rem;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:all .2s}
.p-btn.active{border-color:#00a884;color:#00a884}
.stat-mini{font-size:.63rem;color:#8696a0}
.stat-mini span{color:#00a884;font-weight:700}

.ghost-bubble{opacity:.4;font-style:italic}

/* ── LOADER SCREEN ── */
#loader{
  position:fixed;inset:0;z-index:9999;
  background:#111b21;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
}
#loader.hidden{opacity:0;pointer-events:none;transition:opacity .5s ease;}
.ld-logo{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,#00a884,#025c4c);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;margin-bottom:22px;
  box-shadow:0 0 32px rgba(0,168,132,0.4);
  animation:ldPulse 2s infinite ease-in-out;
}
@keyframes ldPulse{0%,100%{box-shadow:0 0 32px rgba(0,168,132,0.4)}50%{box-shadow:0 0 52px rgba(0,168,132,0.7)}}
.ld-title{font-size:1.4rem;font-weight:800;color:#e9edef;margin-bottom:6px;letter-spacing:.5px}
.ld-sub{font-size:.75rem;color:#8696a0;margin-bottom:32px;text-align:center;line-height:1.5;padding:0 32px}
.ld-bar-wrap{width:220px;height:6px;background:#2a3942;border-radius:3px;overflow:hidden;margin-bottom:10px}
.ld-bar{height:100%;width:0%;background:linear-gradient(90deg,#00a884,#4ade80);border-radius:3px;transition:width .3s ease}
.ld-pct{font-size:.7rem;color:#00a884;font-weight:700;letter-spacing:.5px}
.ld-step{font-size:.65rem;color:#8696a0;margin-top:6px}

/* App hidden until loader done */
#app{opacity:0;transition:opacity .5s ease;}
#app.ready{opacity:1;}
</style>
</head>
<body>

<!-- ── LOADING SCREEN — shown until Kokoro TTS is fully ready ── -->
<div id="loader">
  <div class="ld-logo">🎙️</div>

<div class="call-bar">
  <div class="waveform" id="waveform">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <div class="mic-row">
    <button class="side-btn" id="typeBtn" onclick="toggleType()">⌨️</button>
    <button id="micBtn" onclick="toggleMic()">🎤</button>
    <button class="side-btn" onclick="skipRepeat()" id="skipBtn" style="display:none" title="Skip repeat">⏭</button>

    <textarea id="userInput" placeholder="Type here..." rows="1"></textarea>

      <button class="p-btn active" onclick="setPersona('casual',this)">😎 Alex</button>
      <button class="p-btn" onclick="setPersona('professional',this)">👩 Sarah</button>
      <button class="p-btn" onclick="setPersona('academic',this)">🎓 James</button>
    </div>
    <div class="stat-mini">talks <span id="talkCount">0</span> · fixes <span id="fixCount">0</span></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyAIceqMXYNY5EH_3vTmIbogjb6wJ2CCBxQ",authDomain:"speakup-27de0.firebaseapp.com",projectId:"speakup-27de0",storageBucket:"speakup-27de0.firebasestorage.app",messagingSenderId:"811108429557",appId:"1:811108429557:web:1ad8de2151de43b8f8dfbc"};
const app=initializeApp(cfg);const db=getFirestore(app);
window._db=db;window._col=collection;window._add=addDoc;window._ts=serverTimestamp;
window._sid=localStorage.getItem('buddy_sid');
if(!window._sid){window._sid='u_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);localStorage.setItem('buddy_sid',window._sid);}
window._log=async(role,text,p,m)=>{try{await _add(_col(_db,'messages'),{sessionId:_sid,role,text,persona:p,mode:m,timestamp:_ts()});}catch(e){}};
// Firebase is ready — but we DON'T init the app yet.
// The Kokoro loader controls when to call init() via _appReady.
window._fbReady=true;

<script type="module">
import { KokoroTTS } from 'https://cdn.jsdelivr.net/npm/kokoro-js@1.2.2/dist/kokoro.web.js';

window._kokoroReady = false;
window._tts = null;
window._audioCtx = null;
window._currentSrc = null;

function getAudioCtx(){
  if(!window._audioCtx || window._audioCtx.state==='closed'){
    window._audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  }
  return window._audioCtx;
}
window._getAudioCtx = getAudioCtx;

function setLoadUI(pct, step){
  const bar = document.getElementById('ldBar');
  const pctEl = document.getElementById('ldPct');
  const stepEl = document.getElementById('ldStep');
  if(bar) bar.style.width = pct + '%';
  if(pctEl) pctEl.textContent = Math.round(pct) + '%';
  if(stepEl) stepEl.textContent = step || '';
}

function revealApp(){
  const loader = document.getElementById('loader');
  const app = document.getElementById('app');
  loader.classList.add('hidden');
  app.classList.add('ready');
  setTimeout(()=>{
    loader.style.display='none';
    // Call init — _appReady is set by the main script block
    if(window._appReady) window._appReady();
  }, 550);
}

(async()=>{
  try{
    setLoadUI(2, 'Connecting to voice model…');

    window._tts = await KokoroTTS.from_pretrained('onnx-community/Kokoro-82M-v1.0',{
      dtype: 'q8',
      progress_callback:(p)=>{
        if(p.status === 'initiate'){
          setLoadUI(5, `Starting: ${p.file||'model'}…`);
        } else if(p.status === 'download'){
          setLoadUI(8, `Downloading voice model…`);
        } else if(p.status === 'progress'){
          // Progress comes per-file; map it to 10–90% range
          const pct = 10 + ((p.progress||0) * 0.80);
          setLoadUI(pct, `Loading voice model… ${Math.round(p.progress||0)}%`);
        } else if(p.status === 'done'){
          setLoadUI(92, 'Finalizing voice engine…');
        }
      }
    });

    window._kokoroReady = true;
    setLoadUI(100, '✅ Voice ready!');

    // Small pause so user sees 100%
    setTimeout(()=> revealApp(), 600);

  } catch(e){
    console.warn('Kokoro failed, using browser voice:', e);
    window._kokoroReady = false;
    setLoadUI(100, '⚠️ Using system voice (HD unavailable)');
    setTimeout(()=> revealApp(), 800);
  }
})();
</script>

<script>
// ── PERSONAS ──
// voice: Kokoro voice ID  |  speed: base speaking speed (mode multiplier applied on top)
// am_michael → warm American male  |  bf_emma → natural British female
// bm_george → authoritative British male
const P={
  casual:{
    name:"Alex",emoji:"🧑",
    voice:"am_michael", speed:1.08,          // upbeat, natural pace
    pitch:1.0,rate:0.92,                      // fallback only
    style:`a real male best friend. Warm, funny, genuine. You share YOUR thoughts. You react to what he says. You NEVER say sorry or act like an assistant. You talk like someone who genuinely knows and likes this person.`,
    openers:["Yo, what's good? Something on your mind?","Bro I was just thinking — you ever feel like time moves too fast? What about you?","Okay real talk — how are you actually doing today?","Man, I've been meaning to ask you something. What's one thing you want to change about your life right now?"]
  },
  professional:{
    name:"Sarah",emoji:"👩",
    voice:"bf_emma", speed:0.95,             // composed, British warmth
    pitch:1.08,rate:0.9,
    style:`a warm, sharp British woman. Encouraging but direct. You push people to be better without being harsh. Never apologize unnecessarily.`,
    openers:["Right, let's work. What do you want to get better at today?","I've been thinking — what's the one thing stopping you from speaking English confidently?","Okay, challenge time. Tell me about yourself in English. Go."]
  },
  academic:{
    name:"James",emoji:"🎓",
    voice:"bm_george", speed:0.88,           // measured, scholarly
    pitch:0.92,rate:0.87,
    style:`a calm, thoughtful professor. You speak slowly and clearly. You open deep topics. You make people feel intelligent. Never generic.`,
    openers:["What do you believe makes a person truly successful — not just rich, but successful?","Let's talk about something real. What's one thing you're afraid to say in English?","You know the best way to improve is to think in English. So — what are you thinking about right now?"]
  }
};

// ── VOICE SPEED MULTIPLIERS PER MODE ──
// Applied on top of persona base speed to tune tone & vibe per context
const MODE_SPEED={
  buddy:1.05,      // energetic, conversational
  coach:0.95,      // firm, deliberate
  interview:0.92,  // professional, measured
  repeat:0.80      // slow, crystal-clear articulation for learning
};

// ── MODES ──
const MODES={
  buddy:{
    label:"Buddy Talk",
    prompt:`Have a natural warm conversation. React to what they say. Share your own thoughts. NEVER ask generic questions. Keep going naturally like a real WhatsApp voice call. After every message check for mistakes — if there's a mistake, put it in [CORRECTION:...] at the END.`
  },
  coach:{
    label:"Strict Coach",
    prompt:`You are a strict but kind English coach. Your job is to improve their English every single message. Rules:
1. After EVERY user message, identify their biggest mistake.
2. Put it in [CORRECTION: "wrong" → "right" — why] at the END.
3. Make them feel the correction but keep going naturally.
4. Every 5 exchanges, give them a [REPORT:...] summary of their pattern mistakes.
5. Keep replies short — 2 sentences then correction.`
  },
  interview:{
    label:"Interview Prep",
    prompt:`You are a professional interviewer. Ask one interview question at a time. After their answer: 1) Note what was good in ONE sentence. 2) Correct their English mistake if any with [CORRECTION:...]. 3) Ask the next question. Keep it warm but professional.`
  },
  repeat:{
    label:"Repeat After Me",
    prompt:`You are teaching pronunciation and fluency. Your job: say a natural English sentence. Then tell the user to repeat it. After they repeat: 1) If correct say "Perfect! 🎉" and give the next sentence. 2) If wrong put [CORRECTION:...] and tell them to try again. Focus on natural phrases people use in real life.`
  }
};

// ── STATE ──
let persona='casual', mode='buddy';
let history=[], talks=0, fixes=0;
let isLoading=false, isSpeaking=false, isListening=false;
let recognition=null, voices=[];
let typeMode=false;
let pendingRepeat=null;
let sessionMistakes=[], fluencyScore=0;
let micUnlocked=false; // true after first mic tap — enables auto-listen chain
let streak=parseInt(localStorage.getItem('buddy_streak')||'0');
let lastDay=localStorage.getItem('buddy_lastDay')||'';

// streak logic
const today=new Date().toDateString();
if(lastDay!==today){
  if(lastDay===new Date(Date.now()-86400000).toDateString()){streak++;}
  else if(lastDay!==today){streak=1;}
  localStorage.setItem('buddy_streak',streak);
  localStorage.setItem('buddy_lastDay',today);
}
document.getElementById('scStreak').textContent=streak+'🔥';

// ── VOICES ──
function loadVoices(){voices=window.speechSynthesis.getVoices();}
loadVoices();
if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=loadVoices;

function getVoice(male){
  const m=['Google US English','Microsoft Guy Online','Microsoft David','Daniel','Alex','Aaron'];
  const f=['Google UK English Female','Google US English Female','Microsoft Zira Online','Samantha','Victoria'];
  const list=male?m:f;
  for(const n of list){const v=voices.find(v=>v.name===n||v.name.startsWith(n));if(v)return v;}
  const p=voices.find(v=>v.lang&&v.lang.startsWith('en')&&(v.name.includes('Enhanced')||v.name.includes('Premium')||v.name.includes('Online')));
  if(p)return p;
  return voices.find(v=>v.lang&&v.lang.startsWith('en'))||voices[0]||null;
}

// ── SPEAK (Kokoro HD TTS engine) ──
// Primary: Kokoro ONNX (am_michael / bf_emma / bm_george) — free, unlimited, ElevenLabs-quality
// Fallback: Web Speech API if Kokoro hasn't loaded yet
function speak(text, cb){
  if(!text){cb&&cb();return;}
  const clean=text.replace(/\[CORRECTION:.*?\]/gs,'').replace(/\[REPORT:.*?\]/gs,'').replace(/[*_#\[\]]/g,'').replace(/\s+/g,' ').trim();
  if(!clean){cb&&cb();return;}

  window.speechSynthesis.cancel();
  isSpeaking=true; setStatus('speaking');
  document.getElementById('buddyFace').classList.add('speaking');

  if(window._kokoroReady && window._tts){
    _speakKokoro(clean, cb);
  } else {
    _speakFallback(clean, cb);
    // Also set a listener so next speak() uses Kokoro once ready
    if(!window._onKokoroReady){
      window._onKokoroReady=()=>{ /* ready for next call */ };
    }
  }
}

async function _speakKokoro(text, cb){
  try{
    // Compute final speed: persona base × mode multiplier
    const baseSpeed = P[persona].speed || 1.0;
    const modeMulti = MODE_SPEED[mode] || 1.0;
    const speed = +(baseSpeed * modeMulti).toFixed(2);

    // Generate audio with Kokoro
    const result = await window._tts.generate(text,{
      voice: P[persona].voice,
      speed: speed
    });

    // Resume AudioContext (required for iOS/mobile after user gesture)
    const ctx = window._getAudioCtx();
    if(ctx.state==='suspended') await ctx.resume();

    // Build and play AudioBuffer
    const buf = ctx.createBuffer(1, result.audio.length, result.sampling_rate);
    buf.getChannelData(0).set(result.audio);

    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);

    // Store reference so we can stop mid-speech
    window._currentSrc = src;

    src.onended = ()=>{
      window._currentSrc = null;
      isSpeaking=false;
      document.getElementById('buddyFace').classList.remove('speaking');
      setStatus('idle'); cb&&cb();
      if(!typeMode&&!isLoading) setTimeout(()=>startListening(),700);
    };

    src.start(0);

  }catch(e){
    console.warn('Kokoro speak error, falling back:', e);
    _speakFallback(text, cb);
  }
}

function _speakFallback(text, cb){
  const male=(persona==='casual'||persona==='academic');
  const v=getVoice(male);
  const utt=new SpeechSynthesisUtterance(text);
  if(v)utt.voice=v;
  utt.pitch=P[persona].pitch; utt.rate=P[persona].rate;
  utt.volume=1.0; utt.lang='en-US';
  utt.onend=()=>{
    isSpeaking=false;
    document.getElementById('buddyFace').classList.remove('speaking');
    setStatus('idle'); cb&&cb();
    if(!typeMode&&!isLoading) setTimeout(()=>startListening(),700);
  };
  utt.onerror=(e)=>{
    if(e.error==='interrupted')return;
    isSpeaking=false;
    document.getElementById('buddyFace').classList.remove('speaking');
    setStatus('idle'); cb&&cb();
  };
  setTimeout(()=>window.speechSynthesis.speak(utt),80);
  const ka=setInterval(()=>{if(!isSpeaking){clearInterval(ka);return;}if(window.speechSynthesis.paused)window.speechSynthesis.resume();},8000);
}

// ── STATUS ──
function setStatus(state){
  const el=document.getElementById('callStatus');
  const btn=document.getElementById('micBtn');
  const wf=document.getElementById('waveform');
  el.className='status'; wf.className='waveform';
  if(state==='listening'){
    el.className='status listening';el.textContent='listening...';
    btn.className='listening';btn.textContent='⏹';
    wf.className='waveform on listening';
  }else if(state==='speaking'){
    el.className='status speaking';el.textContent=P[persona].name+' speaking...';
    btn.className='speaking';btn.textContent='🔇';
    wf.className='waveform on speaking';
  }else if(state==='thinking'){
    el.className='status thinking';el.textContent='thinking...';
    btn.className='off';btn.textContent='💭';
  }else{
    el.textContent='your English coach';
    btn.className='';btn.textContent='🎤';
  }
}

// ── RECOGNITION ──
function buildRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();
  r.lang='en-US';r.continuous=false;r.interimResults=true;r.maxAlternatives=1;
  let final='';
  r.onstart=()=>{isListening=true;setStatus('listening');};
  r.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    showGhost(final||interim);
  };
  r.onend=()=>{
    isListening=false;removeGhost();
    const text=final.trim();final='';
    setStatus('idle');
    if(text){
      if(mode==='repeat'&&pendingRepeat) checkRepeat(text);
      else processMessage(text);
    }else{
      // Only auto-restart if user has unlocked mic and nothing else is happening
      if(micUnlocked&&!isLoading&&!isSpeaking)setTimeout(()=>startListening(),1200);
    }
  };
  r.onerror=(e)=>{
    isListening=false;removeGhost();final='';setStatus('idle');
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      micUnlocked=false; // reset — user needs to re-tap
      addMsg('ai','Microphone access denied. Please allow mic and tap the button again.', false);
      return;
    }
    if(micUnlocked&&!isLoading&&!isSpeaking)setTimeout(()=>startListening(),1200);
  };
  return r;
}

function startListening(){
  if(!micUnlocked||isListening||isLoading||isSpeaking||typeMode)return;
  recognition=buildRec();
  if(!recognition)return;
  try{recognition.start();}catch(e){
    // Already started or other error — reset and try once more after delay
    isListening=false;
    if(e.name==='InvalidStateError')return; // already running
    setTimeout(()=>{if(!isListening&&!isSpeaking&&!isLoading)startListening();},500);
  }
}

function stopSpeaking(){
  // Stop Kokoro audio
  if(window._currentSrc){try{window._currentSrc.stop();}catch(e){}window._currentSrc=null;}
  // Stop Web Speech fallback
  window.speechSynthesis.cancel();
  isSpeaking=false;
  document.getElementById('buddyFace').classList.remove('speaking');
}
function toggleMic(){
  // First tap unlocks mic (required for mobile gesture policy)
  if(!micUnlocked){
    micUnlocked=true;
    // Also resume AudioContext for iOS — must happen inside user gesture
    try{
      const ctx=window._getAudioCtx();
      if(ctx.state==='suspended') ctx.resume();
    }catch(e){}
  }
  if(isSpeaking){stopSpeaking();setStatus('idle');setTimeout(()=>startListening(),300);return;}
  if(isListening){recognition&&recognition.stop();return;}
  if(isLoading)return;
  startListening();
}

// ── GHOST ──
function showGhost(text){
  let g=document.getElementById('ghost');
  if(!g){const chat=document.getElementById('chat');g=document.createElement('div');g.id='ghost';g.className='msg user';const b=document.createElement('div');b.className='bubble ghost-bubble';b.id='ghost-text';g.appendChild(b);chat.appendChild(g);}
  document.getElementById('ghost-text').textContent=text;
  document.getElementById('chat').scrollTop=99999;
}
function removeGhost(){const g=document.getElementById('ghost');if(g)g.remove();}

// ── TYPE ──
function toggleType(){
  typeMode=!typeMode;
  document.getElementById('typeArea').classList.toggle('show',typeMode);
  document.getElementById('typeBtn').classList.toggle('on',typeMode);
  if(typeMode){if(isListening)recognition&&recognition.stop();setTimeout(()=>document.getElementById('userInput').focus(),100);}
}
function sendTyped(){
  const input=document.getElementById('userInput');
  const text=input.value.trim();
  if(!text||isLoading)return;
  input.value='';input.style.height='auto';
  if(mode==='repeat'&&pendingRepeat)checkRepeat(text);
  else processMessage(text);
}

// ── REPEAT MODE ──
function checkRepeat(userText){
  if(!pendingRepeat)return;
  const target=pendingRepeat.toLowerCase().replace(/[^a-z\s]/g,'').trim();
  const said=userText.toLowerCase().replace(/[^a-z\s]/g,'').trim();
  const similarity=calcSimilarity(target,said);

  if(similarity>0.75){
    // Good enough!
    addMsg('ai','Perfect! 🎉 That was great.',false);
    speak('Perfect! That was great.');
    pendingRepeat=null;
    document.getElementById('skipBtn').style.display='none';
    fixes++;updateStats();
    // Give next sentence after a moment
    setTimeout(()=>continueRepeat(),2000);
  }else{
    // Wrong — show what was different
    showCorrectionCard(userText,pendingRepeat,'Try to match the exact words and rhythm');
    addMsg('ai','Good try! Say it again:',false);
    speak('Good try. Say it again: '+pendingRepeat);
  }
}

function calcSimilarity(a,b){
  const wa=a.split(' '),wb=b.split(' ');
  const matches=wa.filter(w=>wb.includes(w)).length;
  return matches/Math.max(wa.length,wb.length);
}

function continueRepeat(){
  processMessage('give me the next sentence to repeat');
}

function skipRepeat(){
  pendingRepeat=null;
  document.getElementById('skipBtn').style.display='none';
  continueRepeat();
}

// ── CORE PROCESS ──
async function processMessage(text){
  if(isLoading)return;
  stopSpeaking();isSpeaking=false;
  isLoading=true;
  document.getElementById('sendBtn').disabled=true;

  talks++;updateStats();
  addMsg('user',text,false);
  history.push({role:'user',content:text});
  if(window._log)window._log('user',text,persona,mode);
  saveSession();

  setStatus('thinking');showTyping();

  try{
    const res=await fetch('https://api.llm7.io/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer unused'},
      body:JSON.stringify({model:'gpt-4o-mini-2024-07-18',messages:[{role:'system',content:buildPrompt()},...history],max_tokens:200})
    });
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||"Yeah tell me more.";
    removeTyping();
    history.push({role:'assistant',content:reply});
    processReply(reply);
  }catch(e){
    removeTyping();setStatus('idle');isLoading=false;
    document.getElementById('sendBtn').disabled=false;
    addMsg('ai','Connection issue — try again.',false);
  }
}

function buildPrompt(){
  const p=P[persona];const m=MODES[mode];
  return `You are ${p.name}, ${p.style}

YOUR JOB RIGHT NOW: ${m.prompt}

CORRECTION FORMAT — use EXACTLY this when there is a mistake:
[CORRECTION: "what they said wrong" → "the correct way" — one word reason]

REPORT FORMAT — use this for session summaries:
[REPORT: fluency:X% | main mistake: Y | improvement: Z]

HARD RULES:
1. Max 2 sentences in your reply (before correction). This is a voice call.
2. NEVER say sorry, never say "how can I help", never act like an assistant.
3. Only correct REAL mistakes — grammar, wrong word, unnatural phrasing.
4. If in REPEAT mode, give one natural English sentence and say "Now you say it."
5. React to what they actually said. Be real.`;
}

// ── PROCESS REPLY ──
function processReply(text){
  // Extract correction
  const corrMatch=text.match(/\[CORRECTION:\s*"(.+?)"\s*→\s*"(.+?)"\s*[—-]\s*(.+?)\]/s);
  // Extract report
  const reportMatch=text.match(/\[REPORT:\s*(.+?)\]/s);
  // Extract repeat sentence
  const repeatMatch=text.match(/\[REPEAT:\s*"(.+?)"\]/s);

  let main=text
    .replace(/\[CORRECTION:.*?\]/gs,'')
    .replace(/\[REPORT:.*?\]/gs,'')
    .replace(/\[REPEAT:.*?\]/gs,'')
    .trim();

  // Render main reply
  if(main)addMsg('ai',escHtml(main),true);

  // Show correction card if there's a mistake
  if(corrMatch){
    fixes++;updateStats();
    const wrong=corrMatch[1], right=corrMatch[2], why=corrMatch[3];
    sessionMistakes.push({wrong,right,why});
    showCorrectionCard(wrong,right,why);
    if(window._log)window._log('correction',`${wrong}→${right}`,persona,mode);
  }

  // Show report if triggered
  if(reportMatch){
    showReportCard(reportMatch[1]);
  }

  // Repeat mode — set pending
  if(mode==='repeat'&&main){
    const sentenceToRepeat=main.replace(/now you say it\.?/i,'').trim();
    if(sentenceToRepeat.length>5){
      pendingRepeat=sentenceToRepeat;
      document.getElementById('skipBtn').style.display='flex';
    }
  }

  saveSession();
  if(window._log)window._log('ai',text,persona,mode);

  // Calculate fluency
  updateFluency();

  // Speak main text
  speak(main);

  isLoading=false;
  document.getElementById('sendBtn').disabled=false;
}

// ── CORRECTION CARD ──
function showCorrectionCard(wrong,right,why){
  const chat=document.getElementById('chat');
  const card=document.createElement('div');
  card.className='correction-card';
  card.innerHTML=`
    <div class="cc-label">✏️ Let's fix this</div>
    <div class="wrong">"${escHtml(wrong)}"</div>
    <div class="right">✓ "${escHtml(right)}"</div>
    <div class="why">${escHtml(why)}</div>
    <button class="repeat-btn" onclick="speakAndRepeat(this,'${right.replace(/'/g,"\\'")}')">🔊 Hear it · then repeat</button>
  `;
  chat.appendChild(card);
  chat.scrollTop=99999;
}

function speakAndRepeat(btn,phrase){
  btn.disabled=true;btn.textContent='🔊 Listen...';
  speak(phrase,()=>{
    btn.className='repeat-btn done';
    btn.textContent='✅ Now say it yourself!';
    // Start listening for their repeat
    setTimeout(()=>startListening(),600);
  });
}

// ── REPORT CARD ──
function showReportCard(data){
  const chat=document.getElementById('chat');
  const card=document.createElement('div');
  card.className='report-card';

  // Parse report data
  const fluencyMatch=data.match(/fluency:(\d+)%/);
  const mistakeMatch=data.match(/main mistake:\s*([^|]+)/);
  const improveMatch=data.match(/improvement:\s*(.+)/);
  const fl=fluencyMatch?fluencyMatch[1]:fluencyScore;
  const mistake=mistakeMatch?mistakeMatch[1].trim():'Keep going!';
  const improve=improveMatch?improveMatch[1].trim():'You\'re improving!';

  card.innerHTML=`
    <div class="r-title">📊 Your Progress Report</div>
    <div class="r-row"><span class="r-key">Messages this session</span><span class="r-val">${talks}</span></div>
    <div class="r-row"><span class="r-key">Mistakes caught & fixed</span><span class="r-val">${fixes}</span></div>
    <div class="r-row"><span class="r-key">Main pattern mistake</span><span class="r-val">${escHtml(mistake)}</span></div>
    <div class="r-row"><span class="r-key">Coach note</span><span class="r-val">${escHtml(improve)}</span></div>
    <div class="r-row"><span class="r-key">Fluency estimate</span><span class="r-val">${fl}%</span></div>
    <div class="fluency-bar"><div class="fluency-fill" style="width:${fl}%"></div></div>
  `;
  chat.appendChild(card);
  chat.scrollTop=99999;
}

// ── MANUAL REPORT ──
function showReport(){
  if(talks===0){addMsg('ai','Start talking first — then I\'ll show your progress! 💪',false);return;}
  const fl=Math.min(95,Math.max(5,Math.round((talks/(talks+fixes+1))*100)));
  showReportCard(`fluency:${fl}% | main mistake: ${sessionMistakes.length>0?sessionMistakes[sessionMistakes.length-1].why:'Keep talking!'} | improvement: You\'ve had ${talks} exchanges today. ${fixes>0?'I caught '+fixes+' mistakes — each one fixed makes you better.':'Great flow — keep going!'}`);
}

// ── FLUENCY CALC ──
function updateFluency(){
  // Simple: more talks with fewer fixes = higher fluency
  const ratio=talks>0?Math.max(0,1-(fixes/talks)):0;
  fluencyScore=Math.round(ratio*100);
  // Show progress
  const display=talks<3?'--':fluencyScore+'%';
  document.getElementById('scFluency').textContent=display;
}

function updateStats(){
  document.getElementById('scTalks').textContent=talks;
  document.getElementById('scFixed').textContent=fixes;
  document.getElementById('talkCount').textContent=talks;
  document.getElementById('fixCount').textContent=fixes;
}

// ── MODE & PERSONA ──
function setMode(btn,m){
  mode=m;
  document.querySelectorAll('.m-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  pendingRepeat=null;
  resetChat();
}
function setPersona(p,btn){
  persona=p;
  document.querySelectorAll('.p-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('buddyName').textContent=P[p].name;
  document.getElementById('buddyEmoji').textContent=P[p].emoji;
  resetChat();
}
function resetChat(){
  stopSpeaking();
  if(isListening)try{recognition&&recognition.stop();}catch(e){}
  isSpeaking=false;isListening=false;isLoading=false;micUnlocked=false;
  clearSession();
  history=[];talks=0;fixes=0;sessionMistakes=[];fluencyScore=0;
  updateStats();updateFluency();
  document.getElementById('chat').innerHTML='';
  setStatus('idle');startConvo();
}

// ── START ──
async function startConvo(){
  showTyping();setStatus('thinking');
  const opener=P[persona].openers[Math.floor(Math.random()*P[persona].openers.length)];
  const modeIntro=mode==='repeat'?'Tell the user you\'re going to say sentences and they should repeat after you. Start with the first sentence.':
    mode==='coach'?'Introduce yourself as their English coach and ask what they want to work on.':
    mode==='interview'?'Start the interview warmly. Tell them to relax and ask the first question.':
    `Open with: "${opener}"`;

  try{
    const res=await fetch('https://api.llm7.io/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer unused'},
      body:JSON.stringify({model:'gpt-4o-mini-2024-07-18',messages:[
        {role:'system',content:buildPrompt()},
        {role:'user',content:`Start the session. ${modeIntro} Keep it short and warm.`}
      ],max_tokens:100})
    });
    const data=await res.json();
    const text=data.choices?.[0]?.message?.content||opener;
    removeTyping();
    history.push({role:'assistant',content:text});
    addMsg('ai',escHtml(text),true);
    speak(text);
    isLoading=false;
  }catch(e){
    removeTyping();
    addMsg('ai',opener,false);
    speak(opener);
    history.push({role:'assistant',content:opener});
    isLoading=false;
  }
}

// ── HELPERS ──
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function now(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function addMsg(role,content,isHTML=false){
  const chat=document.getElementById('chat');
  const w=document.createElement('div');w.className='msg '+role;
  const b=document.createElement('div');b.className='bubble';
  if(isHTML)b.innerHTML=content;else b.textContent=content;
  const t=document.createElement('span');t.className='msg-time';t.textContent=now();
  b.appendChild(t);w.appendChild(b);chat.appendChild(w);chat.scrollTop=99999;
}
function showTyping(){
  const chat=document.getElementById('chat');
  const w=document.createElement('div');w.className='typing-wrap';w.id='typing';
  const b=document.createElement('div');b.className='typing-bubble';
  b.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';
  w.appendChild(b);chat.appendChild(w);chat.scrollTop=99999;
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

// ── STORAGE ──
function saveSession(){
  try{
    localStorage.setItem('b_h',JSON.stringify(history));
    localStorage.setItem('b_r',document.getElementById('chat').innerHTML);
    localStorage.setItem('b_p',persona);localStorage.setItem('b_m',mode);
    localStorage.setItem('b_t',talks);localStorage.setItem('b_f',fixes);
  }catch(e){}
}
function loadSession(){
  try{
    const h=localStorage.getItem('b_h'),r=localStorage.getItem('b_r');
    if(!h||!r)return false;
    history=JSON.parse(h);
    talks=parseInt(localStorage.getItem('b_t')||0);
    fixes=parseInt(localStorage.getItem('b_f')||0);
    const p=localStorage.getItem('b_p'),m=localStorage.getItem('b_m');
    if(p){persona=p;document.querySelectorAll('.p-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes("'"+p+"'")));document.getElementById('buddyName').textContent=P[p].name;document.getElementById('buddyEmoji').textContent=P[p].emoji;}
    if(m){mode=m;document.querySelectorAll('.m-tab').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes("'"+m+"'")));}
    document.getElementById('chat').innerHTML=r;
    document.getElementById('chat').scrollTop=99999;
    updateStats();updateFluency();
    return true;
  }catch(e){return false;}
}
function clearSession(){['b_h','b_r','b_p','b_m','b_t','b_f'].forEach(k=>localStorage.removeItem(k));}
function newChat(){if(!confirm('Start fresh?'))return;resetChat();}

// textarea
document.getElementById('userInput').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px';});
document.getElementById('userInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendTyped();}});

// ── INIT ──
// Called by Kokoro loader once HD voice is ready (and Firebase is up)
function init(){if(!loadSession())startConvo();else setStatus('idle');}
window._appReady = init;  // Kokoro loader calls this after loading screen
// Fallback: if somehow Firebase fires init before loader (shouldn't happen but safe)
window._fbInit = ()=>{ /* wait for Kokoro loader to call _appReady */ };
</script>
